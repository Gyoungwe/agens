<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Management - Agens</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        body { background: var(--bg-secondary); }
    </style>
</head>
<body>
    <div class="page-container">
        <header class="header">
            <div>
                <h1>🧠 Memory Management</h1>
                <p class="text-secondary text-sm mt-2">Manage agent memories and shared knowledge base</p>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="refreshAll()">↻ Refresh</button>
                <button class="btn btn-primary" onclick="showAddModal()">+ Add Memory</button>
            </div>
        </header>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalMemories">-</div>
                <div class="stat-label">Total Memories</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="globalMemories">-</div>
                <div class="stat-label">Shared</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="agentMemories">-</div>
                <div class="stat-label">Agent</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="sessionMemories">-</div>
                <div class="stat-label">Session</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchFilter('all', this)">All</button>
            <button class="tab-btn" onclick="switchFilter('global', this)">Shared</button>
            <button class="tab-btn" onclick="switchFilter('agent', this)">Agent</button>
            <button class="tab-btn" onclick="switchFilter('session', this)">Session</button>
        </div>

        <!-- Search -->
        <div class="search-bar">
            <input type="text" id="searchQuery" class="input" placeholder="Search memories..." onkeyup="handleSearchKeyup(event)">
            <select id="searchOwner" class="input" style="width: 200px;">
                <option value="">All Owners</option>
            </select>
            <button class="btn btn-primary" onclick="searchMemories()">Search</button>
        </div>

        <!-- Memory List -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">Memory List</span>
                <span class="text-secondary text-sm" id="memoryCount">0 items</span>
            </div>
            <div id="loadingMemories" class="loading hidden">
                <div class="loading-spinner"></div>
                Loading...
            </div>
            <div id="memoryList"></div>
            <div id="emptyMemories" class="empty-state hidden">
                <div class="empty-state-icon">🧠</div>
                <div class="empty-state-title">No memories found</div>
                <div class="empty-state-desc">Add new memories or adjust your search filters</div>
            </div>
        </div>
    </div>

    <!-- Add Memory Modal -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Add Memory</h2>
                <button class="modal-close" onclick="hideAddModal()">×</button>
            </div>
            <div class="form-group">
                <label class="form-label">Memory Content</label>
                <textarea id="memoryText" class="input" rows="4" placeholder="Enter memory content..."></textarea>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label class="form-label">Owner Type</label>
                    <select id="memoryOwnerType" class="input" onchange="handleOwnerTypeChange()">
                        <option value="global">🌐 Shared (global)</option>
                        <option value="agent">🤖 Agent</option>
                        <option value="session">💬 Session</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Owner ID</label>
                    <input type="text" id="memoryOwnerId" class="input" placeholder="agent_id or session_id">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Source</label>
                <input type="text" id="memorySource" class="input" value="manual" placeholder="manual">
            </div>
            <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px;">
                <button class="btn btn-secondary" onclick="hideAddModal()">Cancel</button>
                <button class="btn btn-success" onclick="addMemory()">Add Memory</button>
            </div>
        </div>
    </div>

    <!-- Search Results Modal -->
    <div id="searchModal" class="modal">
        <div class="modal-content" style="max-width: 700px;">
            <div class="modal-header">
                <h2 class="modal-title">🔍 Search Results</h2>
                <button class="modal-close" onclick="hideSearchModal()">×</button>
            </div>
            <div id="searchResultsList"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let memories = [];
        let owners = [];

        async function init() {
            console.log('[Memory] Initializing...');
            await Promise.all([loadStats(), loadOwners(), loadMemories()]);
        }

        async function loadStats() {
            try {
                const res = await fetch(`${API_BASE}/memory/stats`);
                const data = await res.json();
                if (data.success) {
                    const stats = data.stats;
                    const byOwner = stats.by_owner || {};
                    
                    let globalCount = 0, agentCount = 0, sessionCount = 0;
                    for (const [owner, count] of Object.entries(byOwner)) {
                        if (owner === 'global') globalCount = count;
                        else if (owner.startsWith('agent_')) agentCount += count;
                        else sessionCount += count;
                    }
                    
                    document.getElementById('totalMemories').textContent = stats.total || 0;
                    document.getElementById('globalMemories').textContent = globalCount;
                    document.getElementById('agentMemories').textContent = agentCount;
                    document.getElementById('sessionMemories').textContent = sessionCount;
                }
            } catch (e) {
                console.error('[Memory] Failed to load stats:', e);
            }
        }

        async function loadOwners() {
            try {
                const res = await fetch(`${API_BASE}/memory/?limit=500`);
                const data = await res.json();
                if (data.success) {
                    const ownerSet = new Set();
                    data.memories.forEach(m => ownerSet.add(m.owner));
                    owners = Array.from(ownerSet);
                    
                    const select = document.getElementById('searchOwner');
                    select.innerHTML = '<option value="">All Owners</option>';
                    owners.forEach(o => {
                        select.innerHTML += `<option value="${escapeHtml(o)}">${escapeHtml(o.substring(0, 12))}...</option>`;
                    });
                }
            } catch (e) {
                console.error('[Memory] Failed to load owners:', e);
            }
        }

        async function loadMemories() {
            console.log('[Memory] Loading memories...');
            const loading = document.getElementById('loadingMemories');
            const list = document.getElementById('memoryList');
            const empty = document.getElementById('emptyMemories');
            
            loading.classList.remove('hidden');
            list.innerHTML = '';
            empty.classList.add('hidden');

            try {
                const owner = document.getElementById('searchOwner').value;
                const url = owner 
                    ? `${API_BASE}/memory/?owner=${encodeURIComponent(owner)}&limit=100`
                    : `${API_BASE}/memory/?limit=100`;
                
                const res = await fetch(url);
                const data = await res.json();
                console.log('[Memory] Loaded:', data.total, 'memories');
                
                memories = data.memories || [];
                document.getElementById('memoryCount').textContent = `${memories.length} items`;
                renderMemories(memories);
            } catch (e) {
                console.error('[Memory] Failed to load memories:', e);
                showToast('Failed to load memories', 'error');
            } finally {
                loading.classList.add('hidden');
            }
        }

        function renderMemories(memoriesToRender) {
            const list = document.getElementById('memoryList');
            const empty = document.getElementById('emptyMemories');
            
            if (memoriesToRender.length === 0) {
                list.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            list.innerHTML = memoriesToRender.map(m => `
                <div class="memory-card">
                    <div style="display: flex; justify-content: space-between; align-items: start;">
                        <div class="memory-text" style="flex: 1; margin-right: 16px;">${escapeHtml(m.text)}</div>
                        <div style="display: flex; gap: 8px; flex-shrink: 0;">
                            <button class="btn btn-sm btn-secondary" onclick="copyText('${escapeHtml(m.text.replace(/'/g, "\\'"))}')">📋</button>
                            <button class="btn btn-sm btn-secondary" onclick="searchSimilar('${escapeHtml(m.text.replace(/'/g, "\\'"))}')">🔍</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteMemory('${m.id}')">🗑️</button>
                        </div>
                    </div>
                    <div class="memory-meta">
                        <span>Owner: ${escapeHtml(m.owner || 'unknown')}</span>
                        <span>Source: ${escapeHtml(m.source || 'unknown')}</span>
                        <span>Created: ${formatTime(m.created_at)}</span>
                    </div>
                </div>
            `).join('');
        }

        function switchFilter(filter, btnElement) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (btnElement) btnElement.classList.add('active');
            
            const select = document.getElementById('searchOwner');
            if (filter === 'all') select.value = '';
            else if (filter === 'global') select.value = 'global';
            
            loadMemories();
        }

        function handleSearchKeyup(event) {
            if (event.key === 'Enter') searchMemories();
        }

        async function searchMemories() {
            const query = document.getElementById('searchQuery').value.trim();
            if (!query) {
                loadMemories();
                return;
            }

            const owner = document.getElementById('searchOwner').value;

            try {
                const url = `${API_BASE}/memory/search?query=${encodeURIComponent(query)}&top_k=20${owner ? '&owner=' + encodeURIComponent(owner) : ''}`;
                const res = await fetch(url);
                const data = await res.json();

                if (data.success) {
                    showSearchResults(data.results || []);
                } else {
                    showToast('Search failed', 'error');
                }
            } catch (e) {
                console.error('[Memory] Search failed:', e);
                showToast('Search failed: ' + e.message, 'error');
            }
        }

        async function searchSimilar(text) {
            try {
                const res = await fetch(`${API_BASE}/memory/search?query=${encodeURIComponent(text)}&top_k=5`);
                const data = await res.json();
                if (data.success) {
                    showSearchResults(data.results || []);
                }
            } catch (e) {
                showToast('Similar search failed', 'error');
            }
        }

        function showSearchResults(results) {
            const modal = document.getElementById('searchModal');
            const list = document.getElementById('searchResultsList');
            
            if (results.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-state-title">No results found</div></div>';
            } else {
                list.innerHTML = results.map(r => `
                    <div class="memory-card">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                            <span class="tag">${escapeHtml(r.owner || 'unknown')}</span>
                            <span style="color: var(--success); font-weight: 600;">${((r.score || 0) * 100).toFixed(1)}%</span>
                        </div>
                        <div class="memory-text">${escapeHtml(r.text)}</div>
                    </div>
                `).join('');
            }
            
            modal.classList.add('active');
        }

        function hideSearchModal() {
            document.getElementById('searchModal').classList.remove('active');
        }

        function showAddModal() {
            document.getElementById('addModal').classList.add('active');
            document.getElementById('memoryText').value = '';
            document.getElementById('memoryOwnerType').value = 'global';
            document.getElementById('memoryOwnerId').value = '';
            document.getElementById('memorySource').value = 'manual';
            handleOwnerTypeChange();
        }

        function hideAddModal() {
            document.getElementById('addModal').classList.remove('active');
        }

        function handleOwnerTypeChange() {
            const type = document.getElementById('memoryOwnerType').value;
            const ownerInput = document.getElementById('memoryOwnerId');
            
            if (type === 'global') {
                ownerInput.value = 'global';
                ownerInput.disabled = true;
            } else {
                ownerInput.value = '';
                ownerInput.disabled = false;
                ownerInput.placeholder = type === 'agent' ? 'research_agent' : 'session_id';
            }
        }

        async function addMemory() {
            const text = document.getElementById('memoryText').value.trim();
            if (!text) {
                showToast('Please enter memory content', 'error');
                return;
            }

            const ownerType = document.getElementById('memoryOwnerType').value;
            let owner = document.getElementById('memoryOwnerId').value.trim();
            if (!owner) owner = ownerType === 'global' ? 'global' : prompt('Please enter Owner ID:');
            if (!owner) return;

            const source = document.getElementById('memorySource').value.trim() || 'manual';
            const sessionId = ownerType === 'session' ? owner : 'mem_' + Date.now();

            try {
                const res = await fetch(`${API_BASE}/memory/?text=${encodeURIComponent(text)}&session_id=${encodeURIComponent(sessionId)}&owner=${encodeURIComponent(owner)}&source=${encodeURIComponent(source)}`, {
                    method: 'POST'
                });
                
                if (res.ok) {
                    showToast('Memory added successfully', 'success');
                    hideAddModal();
                    await Promise.all([loadStats(), loadMemories()]);
                } else {
                    showToast('Failed to add memory', 'error');
                }
            } catch (e) {
                console.error('[Memory] Add failed:', e);
                showToast('Failed to add memory: ' + e.message, 'error');
            }
        }

        async function deleteMemory(memoryId) {
            if (!confirm('Delete this memory?')) return;

            try {
                const res = await fetch(`${API_BASE}/memory/${memoryId}`, {
                    method: 'DELETE'
                });
                
                if (res.ok) {
                    showToast('Memory deleted', 'success');
                    await Promise.all([loadStats(), loadMemories()]);
                } else {
                    showToast('Failed to delete', 'error');
                }
            } catch (e) {
                showToast('Delete failed: ' + e.message, 'error');
            }
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('Copied!', 'success');
            }).catch(() => {
                showToast('Copy failed', 'error');
            });
        }

        async function refreshAll() {
            await Promise.all([loadStats(), loadMemories(), loadOwners()]);
            showToast('Refreshed', 'success');
        }

        function formatTime(isoString) {
            if (!isoString) return 'unknown';
            try {
                return new Date(isoString).toLocaleString();
            } catch {
                return isoString;
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Close modals on backdrop click
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });

        init();
    </script>
</body>
</html>
