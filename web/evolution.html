<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution Approvals - Agens</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        body { background: var(--bg-secondary); }
        .approval-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
            border-left: 4px solid var(--warning);
        }
        .approval-card.approved { border-left-color: var(--success); }
        .approval-card.rejected { border-left-color: var(--error); opacity: 0.7; }
        .approval-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px; }
        .approval-id { font-weight: 600; }
        .approval-time { font-size: 0.75rem; color: var(--text-secondary); }
        .approval-reason { font-size: 0.875rem; color: var(--text-secondary); margin: 12px 0; padding: 12px; background: var(--bg-tertiary); border-radius: 8px; }
        .approval-actions { display: flex; gap: 8px; margin-top: 16px; }
        .json-viewer-small {
            background: var(--bg-tertiary);
            padding: 8px 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.75rem;
            margin-top: 8px;
            max-height: 100px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <header class="header">
            <div>
                <h1>🔄 Evolution Approvals</h1>
                <p class="text-secondary text-sm mt-2">Review and manage agent evolution requests</p>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="loadApprovals()">↻ Refresh</button>
                <button class="btn btn-primary" onclick="showCreateModal()">+ New Request</button>
            </div>
        </header>

        <!-- Stats -->
        <div class="stats-grid mb-4">
            <div class="stat-card">
                <div class="stat-value" id="pendingCount">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="approvedCount">0</div>
                <div class="stat-label">Approved</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="rejectedCount">0</div>
                <div class="stat-label">Rejected</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('pending', this)">⏳ Pending</button>
            <button class="tab-btn" onclick="switchTab('approved', this)">✅ Approved</button>
            <button class="tab-btn" onclick="switchTab('rejected', this)">❌ Rejected</button>
            <button class="tab-btn" onclick="switchTab('all', this)">📋 All</button>
        </div>

        <!-- Approval List -->
        <div class="card">
            <div id="approvalsList"></div>
            <div id="emptyState" class="empty-state hidden">
                <div class="empty-state-icon">📭</div>
                <div class="empty-state-title">No approvals</div>
                <div class="empty-state-desc">No evolution requests match this filter</div>
            </div>
        </div>
    </div>

    <!-- Create Request Modal -->
    <div id="createModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Create Evolution Request</h2>
                <button class="modal-close" onclick="hideCreateModal()">×</button>
            </div>
            <div class="form-group">
                <label class="form-label">Agent ID</label>
                <input type="text" id="input-agentId" class="input" placeholder="research_agent">
            </div>
            <div class="form-group">
                <label class="form-label">Reason</label>
                <textarea id="input-reason" class="input" rows="3" placeholder="Why does this agent need to evolve?"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">Changes (JSON)</label>
                <textarea id="input-changes" class="input font-mono" rows="4" placeholder='{"skill": "new_skill", "priority": "high"}'></textarea>
            </div>
            <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px;">
                <button class="btn btn-secondary" onclick="hideCreateModal()">Cancel</button>
                <button class="btn btn-primary" onclick="createRequest()">Create Request</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let approvals = [];
        let currentFilter = 'pending';

        async function init() {
            console.log('[Evolution] Initializing...');
            await loadApprovals();
        }

        async function loadApprovals() {
            try {
                const res = await fetch(`${API_BASE}/evolution/approvals`);
                const data = await res.json();
                approvals = data.approvals || [];
                renderStats();
                renderApprovals();
            } catch (e) {
                showToast('Failed to load approvals', 'error');
            }
        }

        function renderStats() {
            const pending = approvals.filter(a => a.status === 'pending').length;
            const approved = approvals.filter(a => a.status === 'approved').length;
            const rejected = approvals.filter(a => a.status === 'rejected').length;
            
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('approvedCount').textContent = approved;
            document.getElementById('rejectedCount').textContent = rejected;
        }

        function renderApprovals() {
            const filtered = currentFilter === 'all' ? approvals : approvals.filter(a => a.status === currentFilter);
            const list = document.getElementById('approvalsList');
            const empty = document.getElementById('emptyState');

            if (filtered.length === 0) {
                list.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            list.innerHTML = filtered.map(a => `
                <div class="approval-card ${a.status}">
                    <div class="approval-header">
                        <div>
                            <div class="approval-id">🤖 ${a.agent_id}</div>
                            <div class="approval-time">ID: ${a.request_id}</div>
                            <div class="approval-time">Created: ${a.created_at}</div>
                        </div>
                        <div>
                            ${a.status === 'pending' ? `
                                <button class="btn btn-sm btn-success" onclick="approveRequest('${a.request_id}')">✅ Approve</button>
                                <button class="btn btn-sm btn-danger" onclick="rejectRequest('${a.request_id}')">❌ Reject</button>
                            ` : `
                                <span class="tag ${a.status === 'approved' ? 'tag-success' : 'tag-error'}">${a.status === 'approved' ? 'Approved' : 'Rejected'}</span>
                            `}
                        </div>
                    </div>
                    ${a.reason ? `<div class="approval-reason">${escapeHtml(a.reason)}</div>` : ''}
                    ${a.changes ? `<div class="json-viewer-small">${escapeHtml(JSON.stringify(a.changes, null, 2))}</div>` : ''}
                </div>
            `).join('');
        }

        function switchTab(tab, btnElement) {
            currentFilter = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (btnElement) btnElement.classList.add('active');
            renderApprovals();
        }

        function showCreateModal() {
            document.getElementById('createModal').classList.add('active');
            document.getElementById('input-agentId').value = '';
            document.getElementById('input-reason').value = '';
            document.getElementById('input-changes').value = '';
        }

        function hideCreateModal() {
            document.getElementById('createModal').classList.remove('active');
        }

        async function createRequest() {
            const agentId = document.getElementById('input-agentId').value.trim();
            const reason = document.getElementById('input-reason').value.trim();
            let changes = {};
            try {
                const changesText = document.getElementById('input-changes').value.trim();
                if (changesText) changes = JSON.parse(changesText);
            } catch (e) {
                showToast('Changes JSON is invalid', 'error');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/evolution/requests`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ agent_id: agentId, reason, changes })
                });
                const data = await res.json();
                if (data.success) {
                    showToast('Request created', 'success');
                    hideCreateModal();
                    await loadApprovals();
                } else {
                    showToast('Failed to create request', 'error');
                }
            } catch (e) {
                showToast('Failed to create request', 'error');
            }
        }

        async function approveRequest(requestId) {
            try {
                const res = await fetch(`${API_BASE}/evolution/approve/${requestId}`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    showToast('Request approved', 'success');
                    await loadApprovals();
                } else {
                    showToast('Failed to approve', 'error');
                }
            } catch (e) {
                showToast('Failed to approve', 'error');
            }
        }

        async function rejectRequest(requestId) {
            try {
                const res = await fetch(`${API_BASE}/evolution/reject/${requestId}`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    showToast('Request rejected', 'success');
                    await loadApprovals();
                } else {
                    showToast('Failed to reject', 'error');
                }
            } catch (e) {
                showToast('Failed to reject', 'error');
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Close modal on backdrop click
        document.getElementById('createModal')?.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal')) hideCreateModal();
        });

        init();
    </script>
</body>
</html>
