<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>进化审批 - Agens</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-tertiary: #0f3460;
            --text-primary: #eaeaea;
            --text-secondary: #a0a0a0;
            --accent: #e94560;
            --success: #4ecca3;
            --warning: #f0883e;
            --border: #2a2a4a;
        }
        body { background: var(--bg-primary); color: var(--text-primary); font-family: system-ui, sans-serif; }
        .card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
        .btn { background: var(--accent); color: white; padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.85; }
        .btn-secondary { background: var(--bg-tertiary); }
        .btn-success { background: var(--success); }
        .btn-warning { background: var(--warning); }
        .btn-sm { padding: 4px 10px; font-size: 12px; }
        .input { background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-primary); padding: 8px 12px; border-radius: 6px; width: 100%; }
        textarea.input { min-height: 100px; resize: vertical; }
        .approval-card { border-left: 4px solid var(--warning); background: var(--bg-tertiary); padding: 16px; border-radius: 8px; margin-bottom: 12px; }
        .approval-card.approved { border-left-color: var(--success); }
        .approval-card.rejected { border-left-color: var(--accent); opacity: 0.7; }
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; color: white; z-index: 1000; animation: slideIn 0.3s ease; }
        .toast-success { background: var(--success); }
        .toast-error { background: var(--accent); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .tab-btn { padding: 8px 16px; background: transparent; border: none; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .json-viewer { background: #000; padding: 12px; border-radius: 6px; font-family: monospace; font-size: 12px; white-space: pre-wrap; max-height: 150px; overflow-y: auto; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: var(--bg-secondary); border-radius: 12px; padding: 24px; max-width: 500px; width: 90%; }
    </style>
</head>
<body class="min-h-screen p-6">
    <div class="max-w-4xl mx-auto">
        <header class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-2xl font-bold">🔄 进化审批</h1>
                <p class="text-sm mt-1" style="color: var(--text-secondary)">管理 Agent 技能进化请求</p>
            </div>
            <div class="flex gap-3">
                <button class="btn btn-secondary" onclick="showCreateModal()">+ 新建请求</button>
                <a href="/" class="btn btn-secondary">← 返回主页</a>
            </div>
        </header>

        <!-- Tabs -->
        <div class="flex border-b mb-6" style="border-color: var(--border)">
            <button class="tab-btn active" onclick="switchTab('pending', this)">⏳ 待审批</button>
            <button class="tab-btn" onclick="switchTab('approved', this)">✅ 已批准</button>
            <button class="tab-btn" onclick="switchTab('rejected', this)">❌ 已拒绝</button>
            <button class="tab-btn" onclick="switchTab('all', this)">📋 全部</button>
        </div>

        <div id="approvalsList"></div>
        <div id="emptyState" class="text-center py-12" style="color: var(--text-secondary)">
            <p class="text-4xl mb-4">📭</p>
            <p>暂无审批记录</p>
        </div>
    </div>

    <!-- Create Modal -->
    <div id="createModal" class="modal hidden">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold">创建进化请求</h2>
                <button onclick="hideCreateModal()" class="text-2xl" style="color: var(--text-secondary)">×</button>
            </div>

            <div class="mb-4">
                <label class="block text-sm mb-2" style="color: var(--text-secondary)">Agent ID</label>
                <input type="text" id="input-agentId" class="input" placeholder="research_agent">
            </div>

            <div class="mb-4">
                <label class="block text-sm mb-2" style="color: var(--text-secondary)">请求原因</label>
                <textarea id="input-reason" class="input" placeholder="为什么需要这个技能..."></textarea>
            </div>

            <div class="mb-4">
                <label class="block text-sm mb-2" style="color: var(--text-secondary)">Proposed Changes (JSON)</label>
                <textarea id="input-changes" class="input" placeholder='{"add_skill": "web_search", "remove_skill": null}'></textarea>
            </div>

            <div class="flex gap-3">
                <button class="btn btn-success" onclick="createRequest()">提交请求</button>
                <button class="btn btn-secondary" onclick="hideCreateModal()">取消</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let approvals = [];
        let currentFilter = 'pending';

        async function init() {
            console.log('[Evolution Page] Initializing...');
            await loadApprovals();
        }

        async function loadApprovals() {
            console.log('[Evolution Page] Loading approvals...');
            try {
                const res = await fetch(`${API_BASE}/evolution/approvals`);
                console.log('[Evolution Page] /evolution/approvals status:', res.status);
                const data = await res.json();
                console.log('[Evolution Page] Approvals data:', data);
                approvals = data.approvals || [];
                renderApprovals();
            } catch (e) {
                console.error('[Evolution Page] Failed to load approvals:', e);
                showToast('加载审批列表失败: ' + e.message, 'error');
            }
        }

        function renderApprovals() {
            const filtered = currentFilter === 'all'
                ? approvals
                : approvals.filter(a => a.status === currentFilter);

            const list = document.getElementById('approvalsList');
            const empty = document.getElementById('emptyState');

            if (filtered.length === 0) {
                list.innerHTML = '';
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                list.innerHTML = filtered.map(a => `
                    <div class="approval-card ${a.status}">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <div class="font-semibold">🤖 ${a.agent_id}</div>
                                <div class="text-xs" style="color: var(--text-secondary)">请求ID: ${a.request_id}</div>
                                <div class="text-xs" style="color: var(--text-secondary)">创建时间: ${a.created_at}</div>
                            </div>
                            <div class="flex gap-2">
                                ${a.status === 'pending' ? `
                                    <button class="btn btn-sm btn-success" onclick="approveRequest('${a.request_id}')">✅ 批准</button>
                                    <button class="btn btn-sm btn-warning" onclick="rejectRequest('${a.request_id}')">❌ 拒绝</button>
                                ` : `
                                    <span class="tag">${a.status === 'approved' ? '已批准' : '已拒绝'}</span>
                                `}
                            </div>
                        </div>
                        <div class="mb-3">
                            <div class="text-sm font-semibold mb-1">请求原因:</div>
                            <p class="text-sm" style="color: var(--text-secondary)">${a.reason || '无'}</p>
                        </div>
                        ${a.changes && Object.keys(a.changes).length > 0 ? `
                            <div class="mb-3">
                                <div class="text-sm font-semibold mb-1">变更内容:</div>
                                <div class="json-viewer">${JSON.stringify(a.changes, null, 2)}</div>
                            </div>
                        ` : ''}
                        ${a.reviewed_at ? `
                            <div class="text-xs" style="color: var(--text-secondary)">
                                ${a.status === 'approved' ? '✅' : '❌'} ${a.reviewer || 'admin'} 于 ${a.reviewed_at} 处理
                                ${a.comment ? `- ${a.comment}` : ''}
                            </div>
                        ` : ''}
                    </div>
                `).join('');
            }
        }

        function switchTab(tab, btnElement) {
            currentFilter = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (btnElement) {
                btnElement.classList.add('active');
            }
            renderApprovals();
        }

        function showCreateModal() {
            document.getElementById('createModal').classList.remove('hidden');
            document.getElementById('input-agentId').value = '';
            document.getElementById('input-reason').value = '';
            document.getElementById('input-changes').value = '';
        }

        function hideCreateModal() {
            document.getElementById('createModal').classList.add('hidden');
        }

        async function createRequest() {
            const agentId = document.getElementById('input-agentId').value.trim();
            const reason = document.getElementById('input-reason').value.trim();
            let changes = {};
            try {
                const changesText = document.getElementById('input-changes').value.trim();
                if (changesText) changes = JSON.parse(changesText);
            } catch (e) {
                showToast('Changes JSON 格式错误', 'error');
                return;
            }

            if (!agentId) {
                showToast('请输入 Agent ID', 'error');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/evolution/request`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ agent_id: agentId, reason, proposed_changes: changes })
                });
                const data = await res.json();
                if (data.success) {
                    showToast('请求创建成功', 'success');
                    hideCreateModal();
                    await loadApprovals();
                } else {
                    showToast('请求创建失败', 'error');
                }
            } catch (e) {
                showToast('请求创建失败: ' + e, 'error');
            }
        }

        async function approveRequest(requestId) {
            const comment = prompt('批准备注 (可选):');
            try {
                await fetch(`${API_BASE}/evolution/approvals/${requestId}/approve`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ comment })
                });
                showToast('已批准', 'success');
                await loadApprovals();
            } catch (e) {
                showToast('操作失败', 'error');
            }
        }

        async function rejectRequest(requestId) {
            const comment = prompt('拒绝原因 (可选):');
            try {
                await fetch(`${API_BASE}/evolution/approvals/${requestId}/reject`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ comment })
                });
                showToast('已拒绝', 'success');
                await loadApprovals();
            } catch (e) {
                showToast('操作失败', 'error');
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast toast-${type}`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        init();
    </script>
</body>
</html>
