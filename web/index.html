<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Agent 智能协作系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1e1e2e;
            --bg-secondary: #2d2d44;
            --bg-tertiary: #363654;
            --bg-hover: #414266;
            --text-primary: #cdd6f4;
            --text-secondary: #a6adc8;
            --accent: #89b4fa;
            --accent-hover: #6ca8fa;
            --success: #a6e3a1;
            --warning: #f9e2af;
            --error: #f38ba8;
            --border: #45475a;
        }

        body {
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        /* 侧边栏 */
        .sidebar {
            width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h1 {
            font-size: 14px;
            color: var(--accent);
            margin-bottom: 3px;
        }

        .sidebar-header .subtitle {
            font-size: 10px;
            color: var(--text-secondary);
        }

        .nav-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }

        .nav-tab {
            flex: 1;
            padding: 10px 5px;
            text-align: center;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
        }

        .nav-tab:hover {
            background: var(--bg-tertiary);
        }

        .nav-tab.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
        }

        .nav-content {
            flex: 1;
            overflow-y: auto;
            display: none;
        }

        .nav-content.active {
            display: block;
        }

        .new-chat-btn {
            margin: 10px;
            padding: 10px;
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .session-item {
            padding: 10px 12px;
            cursor: pointer;
            margin: 2px 8px;
            border-radius: 6px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .session-item:hover {
            background: var(--bg-tertiary);
        }

        .session-item.active {
            background: var(--bg-tertiary);
        }

        .session-item .icon {
            font-size: 12px;
        }

        .session-item .title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* 面板样式 */
        .panel {
            padding: 10px;
            border-bottom: 1px solid var(--border);
        }

        .panel-header {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .panel-item {
            padding: 8px 10px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 11px;
        }

        .panel-item-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .panel-item-name {
            color: var(--accent);
            font-weight: 500;
        }

        .panel-item-status {
            font-size: 10px;
        }

        .status-running { color: var(--success); }
        .status-stopped { color: var(--error); }
        .status-warning { color: var(--warning); }

        /* 主内容区 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 12px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .model-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .model-selector:hover {
            background: var(--bg-hover);
        }

        .model-name {
            color: var(--accent);
            font-weight: 500;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            padding: 4px 10px;
            background: var(--success);
            color: var(--bg-primary);
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
        }

        .header-btn {
            padding: 6px 10px;
            background: var(--bg-tertiary);
            border: none;
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 12px;
        }

        .header-btn:hover {
            background: var(--bg-hover);
        }

        /* 聊天区 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 16px;
            max-width: 85%;
        }

        .message.user {
            margin-left: auto;
        }

        .message.assistant {
            margin-right: auto;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 11px;
        }

        .message.user .message-header {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .message.user .message-avatar {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .message.assistant .message-avatar {
            background: var(--success);
            color: var(--bg-primary);
        }

        .message-time {
            color: var(--text-secondary);
        }

        .message-role {
            color: var(--accent);
            font-weight: 500;
        }

        .message-content {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .message.assistant .message-content {
            background: var(--bg-secondary);
        }

        .message.agent-event {
            margin: 8px auto;
            max-width: 90%;
        }

        .message.agent-event .message-content {
            background: var(--bg-tertiary);
            border-left: 3px solid var(--accent);
            font-size: 12px;
            padding: 8px 12px;
        }

        .message.agent-event.start .message-content { border-left-color: #58a6ff; }
        .message.agent-event.thinking .message-content { border-left-color: #f0883e; }
        .message.agent-event.tool .message-content { border-left-color: #a371f7; }
        .message.agent-event.output .message-content { border-left-color: #79c0ff; }
        .message.agent-event.done .message-content { border-left-color: #3fb950; }
        .message.agent-event.error .message-content { border-left-color: #f85149; }

        .agent-event-content {
            padding: 10px 14px;
            font-size: 12px;
            line-height: 1.6;
            border-radius: 8px;
            background: var(--bg-tertiary);
        }

        .agent-event-header {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .agent-event-icon {
            font-size: 16px;
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-secondary);
            border-radius: 50%;
        }

        .agent-event-name {
            font-weight: 600;
            font-size: 12px;
            flex-shrink: 0;
            padding: 2px 8px;
            border-radius: 4px;
            background: var(--accent);
            color: var(--bg-primary);
        }

        .agent-event-name.orchestrator { background: #f0883e; }
        .agent-event-name.research_agent { background: #58a6ff; }
        .agent-event-name.writer_agent { background: #a371f7; }
        .agent-event-name.executor_agent { background: #3fb950; }

        .agent-event-action {
            color: var(--text-secondary);
            word-break: break-word;
            font-size: 12px;
            margin-top: 4px;
        }

        .message.agent-event.start .agent-event-icon { background: #58a6ff20; }
        .message.agent-event.thinking .agent-event-icon { background: #f0883e20; }
        .message.agent-event.tool .agent-event-icon { background: #a371f720; }
        .message.agent-event.output .agent-event-icon { background: #79c0ff20; }
        .message.agent-event.done .agent-event-icon { background: #3fb95020; }

        .message.agent-event.start { border-left: 3px solid #58a6ff; }
        .message.agent-event.thinking { border-left: 3px solid #f0883e; }
        .message.agent-event.tool { border-left: 3px solid #a371f7; }
        .message.agent-event.output { border-left: 3px solid #79c0ff; }
        .message.agent-event.done { border-left: 3px solid #3fb950; }

        .collaboration-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 16px 0;
            color: var(--text-secondary);
            font-size: 11px;
        }

        .collaboration-divider::before,
        .collaboration-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* 多智能体协作流程卡片 */
        .collab-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin: 8px 0;
            background: var(--bg-secondary);
            border-radius: 8px;
            border-left: 4px solid var(--accent);
            font-size: 12px;
            animation: slideIn 0.3s ease;
        }

        .collab-card.start { border-left-color: #58a6ff; }
        .collab-card.thinking { border-left-color: #f0883e; }
        .collab-card.tool { border-left-color: #a371f7; }
        .collab-card.output { border-left-color: #79c0ff; }
        .collab-card.done { border-left-color: #3fb950; }

        .collab-step {
            font-size: 10px;
            color: var(--text-secondary);
            background: var(--bg-tertiary);
            padding: 2px 6px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .collab-content {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .collab-agent {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
        }

        .collab-arrow {
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .collab-message {
            color: var(--text-primary);
            flex: 1;
        }

        .collab-icon {
            font-size: 16px;
            flex-shrink: 0;
        }

        .message-content pre {
            background: var(--bg-primary);
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 12px;
        }

        .message-content h1 { font-size: 18px; margin: 12px 0 8px; color: var(--text-primary); }
        .message-content h2 { font-size: 16px; margin: 10px 0 6px; color: var(--text-primary); }
        .message-content h3 { font-size: 14px; margin: 8px 0 4px; color: var(--text-secondary); }
        .message-content p { margin: 6px 0; }
        .message-content ul, .message-content ol { margin: 6px 0; padding-left: 20px; }
        .message-content li { margin: 3px 0; }
        .message-content strong { color: var(--accent); }
        .message-content code:not(pre code) { background: var(--bg-tertiary); padding: 2px 5px; border-radius: 3px; font-size: 12px; }

        .typing-content { opacity: 0.9; }

        .message-content code {
            font-family: inherit;
        }

        /* Agent 执行信息 */
        .agent-info {
            background: var(--bg-tertiary);
            border-radius: 8px;
            padding: 8px 12px;
            margin: 6px 0;
            font-size: 11px;
        }

        .agent-info-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }

        .agent-name {
            color: var(--accent);
            font-weight: 500;
        }

        .agent-status {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .agent-status.running {
            background: var(--success);
            color: var(--bg-primary);
        }

        .agent-status.done {
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }

        /* 输入区 */
        .input-container {
            padding: 12px 20px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-box {
            flex: 1;
            display: flex;
            background: var(--bg-tertiary);
            border-radius: 10px;
            padding: 4px;
        }

        .input-box textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 13px;
            padding: 10px 12px;
            resize: none;
            max-height: 120px;
        }

        .send-btn {
            padding: 10px 16px;
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .send-btn:hover:not(:disabled) {
            background: var(--accent-hover);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 加载状态 */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-radius: 12px;
            width: fit-content;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }

        /* 空白状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .empty-state h2 {
            font-size: 16px;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .empty-state p {
            font-size: 12px;
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: 12px;
            width: 400px;
            max-height: 70vh;
            overflow: hidden;
        }

        .modal-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 14px;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
        }

        .modal-body {
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .provider-item, .hook-item, .skill-item {
            padding: 12px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .provider-item:hover, .hook-item:hover, .skill-item:hover {
            background: var(--bg-hover);
        }

        .provider-item.active {
            border: 2px solid var(--accent);
        }

        .provider-item h3, .hook-item h3, .skill-item h3 {
            font-size: 12px;
            margin-bottom: 4px;
        }

        .provider-item p, .hook-item p, .skill-item p {
            font-size: 10px;
            color: var(--text-secondary);
        }

        .provider-check {
            float: right;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent);
            color: var(--bg-primary);
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .provider-item.active .provider-check {
            display: flex;
        }

        /* Hook 标签 */
        .hook-tag {
            display: inline-block;
            padding: 2px 6px;
            background: var(--bg-secondary);
            border-radius: 4px;
            font-size: 10px;
            margin-right: 4px;
        }

        /* 统计数字 */
        .stat-number {
            font-size: 18px;
            font-weight: 600;
            color: var(--accent);
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-secondary);
        }

        /* 流程可视化 */
        .flow-timeline {
            padding: 10px;
        }

        .flow-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
            padding: 10px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            border-left: 3px solid var(--accent);
        }

        .flow-item.sender {
            border-left-color: var(--accent);
        }

        .flow-item.receiver {
            border-left-color: var(--success);
        }

        .flow-time {
            font-size: 10px;
            color: var(--text-secondary);
            min-width: 60px;
            margin-right: 10px;
        }

        .flow-content {
            flex: 1;
        }

        .flow-arrow {
            display: flex;
            align-items: center;
            margin: 8px 0;
            color: var(--text-secondary);
            font-size: 12px;
        }

        .flow-arrow::before {
            content: "↓";
            margin-right: 8px;
            color: var(--accent);
        }

        .flow-agent {
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .flow-recipient {
            font-size: 11px;
            color: var(--success);
            margin-bottom: 4px;
        }

        .flow-type {
            display: inline-block;
            padding: 2px 6px;
            background: var(--bg-secondary);
            border-radius: 4px;
            font-size: 10px;
            margin-right: 8px;
        }

        .flow-type.task { background: var(--accent); color: var(--bg-primary); }
        .flow-type.result { background: var(--success); color: var(--bg-primary); }
        .flow-type.error { background: var(--error); color: var(--bg-primary); }
        .flow-type.status { background: var(--warning); color: var(--bg-primary); }

        .flow-payload {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 6px;
            padding: 6px;
            background: var(--bg-primary);
            border-radius: 4px;
            word-break: break-all;
        }

        /* 任务结果面板 */
        .task-result {
            margin-bottom: 10px;
            padding: 10px;
            background: var(--bg-tertiary);
            border-radius: 6px;
        }

        .task-result-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .task-agent {
            color: var(--accent);
            font-weight: 600;
            font-size: 12px;
        }

        .task-status {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .task-status.success { background: var(--success); color: var(--bg-primary); }
        .task-status.error { background: var(--error); color: var(--bg-primary); }

        .task-result-content {
            font-size: 11px;
            color: var(--text-secondary);
            max-height: 80px;
            overflow-y: auto;
        }

        .empty-flow {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
        }

        /* Agent 事件样式 */
        .agent-event {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            margin-bottom: 6px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            font-size: 11px;
            animation: slideIn 0.3s ease;
        }

        .agent-event-start { border-left: 3px solid var(--accent); }
        .agent-event-thinking { border-left: 3px solid var(--warning); }
        .agent-event-tool { border-left: 3px solid #9b59b6; }
        .agent-event-output { border-left: 3px solid var(--success); }
        .agent-event-done { border-left: 3px solid var(--success); }

        .event-time {
            color: var(--text-secondary);
            margin-right: 8px;
            font-size: 10px;
        }

        .event-agent {
            color: var(--accent);
            font-weight: 600;
            margin-right: 8px;
        }

        .event-message {
            color: var(--text-primary);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>🚀 Multi-Agent</h1>
                <div class="subtitle">智能协作系统 v1.0</div>
            </div>

            <div class="nav-tabs">
                <div class="nav-tab active" onclick="switchTab('sessions')">💬</div>
                <div class="nav-tab" onclick="switchTab('agents')">🤖</div>
                <div class="nav-tab" onclick="switchTab('hooks')">🔗</div>
                <div class="nav-tab" onclick="switchTab('skills')">🔧</div>
                <div class="nav-tab" onclick="switchTab('flow')">🔀</div>
            </div>

            <!-- 会话列表 -->
            <div class="nav-content active" id="sessionsTab">
                <button class="new-chat-btn" onclick="createNewSession()">+ 新会话</button>
                <div class="sessions-list" id="sessionsList"></div>
            </div>

            <!-- Agent 面板 -->
            <div class="nav-content" id="agentsTab">
                <div class="panel">
                    <div class="panel-header">🤖 工作 Agent</div>
                    <div id="agentsPanel"></div>
                </div>
                <div class="panel">
                    <div class="panel-header">📊 系统状态</div>
                    <div id="systemStats"></div>
                </div>
            </div>

            <!-- Hooks 面板 -->
            <div class="nav-content" id="hooksTab">
                <div class="panel">
                    <div class="panel-header">🔗 已注册 Hooks</div>
                    <div id="hooksPanel"></div>
                </div>
                <div class="panel">
                    <div class="panel-header">📝 Hook 使用记录</div>
                    <div id="hooksLog"></div>
                </div>
            </div>

            <!-- 技能面板 -->
            <div class="nav-content" id="skillsTab">
                <div class="panel">
                    <div class="panel-header">🔧 可用技能</div>
                    <div id="skillsPanel"></div>
                </div>
            </div>

            <!-- 流程可视化面板 -->
            <div class="nav-content" id="flowTab">
                <div class="panel">
                    <div class="panel-header">🔀 Agent 协作流程</div>
                    <div style="padding: 10px;">
                        <button class="header-btn" onclick="loadFlowData()" style="margin-bottom: 10px;">🔄 刷新</button>
                    </div>
                    <div id="flowTimeline"></div>
                </div>
                <div class="panel">
                    <div class="panel-header">📊 任务结果</div>
                    <div id="taskResults"></div>
                </div>
                <!-- 实时事件显示 -->
                <div class="panel">
                    <div class="panel-header">⚡ 实时事件流</div>
                    <div id="liveEvents" style="max-height: 200px; overflow-y: auto; padding: 10px;">
                        <div style="color: var(--text-secondary); font-size: 11px;">等待事件...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main">
            <!-- 顶部栏 -->
            <div class="header">
                <div class="header-left">
                    <div class="model-selector" onclick="showModelSelector()">
                        <span class="model-name" id="currentModel">MiniMax M2.7</span>
                        <span>▼</span>
                    </div>
                    <div class="status-badge" id="statusBadge">就绪</div>
                </div>
                <div class="header-right">
                    <button class="header-btn" onclick="reloadSystem()">🔄</button>
                    <button class="header-btn" onclick="showDebug()">🐛</button>
                </div>
            </div>

            <!-- 聊天区 -->
            <div class="chat-container" id="chatContainer">
                <div class="empty-state" id="emptyState">
                    <div class="icon">🤖</div>
                    <h2>Multi-Agent 智能协作系统</h2>
                    <p>开始对话，探索 AI 的无限可能</p>
                </div>
                <!-- Agent 事件流显示 -->
                <div id="agentEvents" style="display:none;"></div>
            </div>

            <!-- 输入区 -->
            <div class="input-container">
                <div class="input-wrapper">
                    <div class="input-box">
                        <textarea 
                            id="messageInput" 
                            placeholder="输入消息..." 
                            rows="1"
                            onkeydown="handleKeyDown(event)"
                            oninput="autoResize(this)"
                        ></textarea>
                    </div>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 模型选择弹窗 -->
    <div class="modal-overlay" id="modelSelectorModal">
        <div class="modal">
            <div class="modal-header">
                <h2>选择模型</h2>
                <button class="modal-close" onclick="closeModelSelector()">×</button>
            </div>
            <div class="modal-body" id="providersList"></div>
            <div style="padding:15px;border-top:1px solid var(--border);">
                <button class="header-btn" onclick="showAddProviderModal()" style="width:100%;">+ 添加自定义模型</button>
            </div>
        </div>
    </div>

    <!-- 添加 Provider 弹窗 -->
    <div class="modal-overlay" id="addProviderModal">
        <div class="modal" style="width: 450px;">
            <div class="modal-header">
                <h2>➕ 添加自定义模型</h2>
                <button class="modal-close" onclick="closeAddProviderModal()">×</button>
            </div>
            <div class="modal-body">
                <div style="display:flex;flex-direction:column;gap:12px;">
                    <div>
                        <label style="font-size:12px;color:var(--text-secondary);">模型ID</label>
                        <input type="text" id="providerId" placeholder="如: my-gpt4" style="width:100%;padding:8px;background:var(--bg-tertiary);border:1px solid var(--border);color:var(--text-primary);border-radius:4px;">
                    </div>
                    <div>
                        <label style="font-size:12px;color:var(--text-secondary);">显示名称</label>
                        <input type="text" id="providerName" placeholder="如: 我的 GPT-4" style="width:100%;padding:8px;background:var(--bg-tertiary);border:1px solid var(--border);color:var(--text-primary);border-radius:4px;">
                    </div>
                    <div>
                        <label style="font-size:12px;color:var(--text-secondary);">类型</label>
                        <select id="providerType" style="width:100%;padding:8px;background:var(--bg-tertiary);border:1px solid var(--border);color:var(--text-primary);border-radius:4px;">
                            <option value="openai">OpenAI 兼容</option>
                            <option value="anthropic">Anthropic</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-size:12px;color:var(--text-secondary);">模型名称</label>
                        <input type="text" id="providerModel" placeholder="如: gpt-4" style="width:100%;padding:8px;background:var(--bg-tertiary);border:1px solid var(--border);color:var(--text-primary);border-radius:4px;">
                    </div>
                    <div>
                        <label style="font-size:12px;color:var(--text-secondary);">API 地址</label>
                        <input type="text" id="providerBaseUrl" placeholder="如: https://api.openai.com/v1" style="width:100%;padding:8px;background:var(--bg-tertiary);border:1px solid var(--border);color:var(--text-primary);border-radius:4px;">
                    </div>
                    <div>
                        <label style="font-size:12px;color:var(--text-secondary);">API Key</label>
                        <input type="password" id="providerApiKey" placeholder="输入 API Key" style="width:100%;padding:8px;background:var(--bg-tertiary);border:1px solid var(--border);color:var(--text-primary);border-radius:4px;">
                    </div>
                </div>
                <button onclick="addProvider()" style="margin-top:15px;width:100%;padding:10px;background:var(--accent);color:var(--bg-primary);border:none;border-radius:6px;cursor:pointer;font-weight:600;">添加模型</button>
            </div>
        </div>
    </div>

    <!-- Debug 弹窗 -->
    <div class="modal-overlay" id="debugModal">
        <div class="modal" style="width: 500px;">
            <div class="modal-header">
                <h2>🐛 系统调试信息</h2>
                <button class="modal-close" onclick="closeDebug()">×</button>
            </div>
            <div class="modal-body" id="debugContent"></div>
        </div>
    </div>

    <script>
        // 全局状态
        let currentSessionId = null;
        let currentProvider = 'minimax_m2';
        let providers = [];
        let isLoading = false;

        const API_BASE = 'http://localhost:8000';

        // 初始化
        async function init() {
            await checkHealth();
            await loadSessions();
            await loadProviders();
            await loadAgents();
            await loadHooks();
            await loadSkills();
        }

        // 切换标签
        function switchTab(tab) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
            
            // 切换到流程面板时加载数据
            if (tab === 'flow') {
                loadFlowData();
            }
        }

        // 健康检查
        async function checkHealth() {
            try {
                const res = await fetch(`${API_BASE}/health`);
                const data = await res.json();
                document.getElementById('statusBadge').textContent = data.status === 'healthy' ? '就绪' : '初始化中';
                document.getElementById('statusBadge').style.background = data.status === 'healthy' ? 'var(--success)' : 'var(--warning)';
                document.getElementById('currentModel').textContent = data.model;
            } catch (e) {
                document.getElementById('statusBadge').textContent = '离线';
                document.getElementById('statusBadge').style.background = 'var(--error)';
            }
        }

        // 加载会话列表
        async function loadSessions() {
            try {
                const res = await fetch(`${API_BASE}/sessions`);
                const sessions = await res.json();
                const list = document.getElementById('sessionsList');
                if (sessions.length === 0) {
                    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-secondary);font-size:11px;">暂无会话</div>';
                    return;
                }
                list.innerHTML = sessions.map(s => `
                    <div class="session-item ${s.session_id === currentSessionId ? 'active' : ''}" 
                         onclick="selectSession('${s.session_id}')">
                        <span class="icon">💬</span>
                        <span class="title">${s.title || '新会话'}</span>
                        <span style="font-size:10px;color:var(--text-secondary)">${s.message_count || 0}</span>
                    </div>
                `).join('');
            } catch (e) {
                console.error('Failed to load sessions:', e);
            }
        }

        // 加载 Agent 信息
        async function loadAgents() {
            try {
                const res = await fetch(`${API_BASE}/debug/agents`);
                const data = await res.json();
                
                const panel = document.getElementById('agentsPanel');
                if (data.agents && data.agents.length > 0) {
                    panel.innerHTML = data.agents.map(a => `
                        <div class="panel-item">
                            <div class="panel-item-header">
                                <span class="panel-item-name">${a.id}</span>
                                <span class="panel-item-status ${a.running ? 'status-running' : 'status-stopped'}">
                                    ${a.running ? '运行中' : '已停止'}
                                </span>
                            </div>
                            <div style="font-size:10px;color:var(--text-secondary)">${a.skills ? a.skills.join(', ') : '无技能'}</div>
                        </div>
                    `).join('');
                } else {
                    panel.innerHTML = '<div style="padding:10px;color:var(--error);font-size:11px;">⚠️ 没有注册的 Agent</div>';
                }

                const stats = document.getElementById('systemStats');
                stats.innerHTML = `
                    <div class="panel-item">
                        <span class="stat-number">${data.agents ? data.agents.length : 0}</span>
                        <span class="stat-label"> / ${data.bus_agents ? data.bus_agents.length : 0} Agent (注册)</span>
                    </div>
                `;
            } catch (e) {
                console.error('Failed to load agents:', e);
            }
        }

        // 加载 Hooks
        async function loadHooks() {
            try {
                const res = await fetch(`${API_BASE}/hooks`);
                const hooks = await res.json();
                const panel = document.getElementById('hooksPanel');
                
                if (hooks.length === 0) {
                    panel.innerHTML = '<div style="padding:10px;color:var(--warning);font-size:11px;">暂无 Hook</div>';
                    return;
                }

                panel.innerHTML = hooks.map(h => `
                    <div class="hook-item">
                        <h3>🔗 ${h.name}</h3>
                        <p>${h.description || '无描述'}</p>
                    </div>
                `).join('');
            } catch (e) {
                console.error('Failed to load hooks:', e);
            }
        }

        // 加载技能
        async function loadSkills() {
            try {
                const res = await fetch(`${API_BASE}/skills`);
                const skills = await res.json();
                const panel = document.getElementById('skillsPanel');
                
                if (skills.length === 0) {
                    panel.innerHTML = '<div style="padding:10px;color:var(--warning);font-size:11px;">暂无技能</div>';
                    return;
                }

                panel.innerHTML = skills.map(s => `
                    <div class="skill-item">
                        <h3>🔧 ${s.name}</h3>
                        <p>${s.description || '无描述'}</p>
                        <div style="margin-top:6px;">
                            <span class="hook-tag">v${s.version}</span>
                            <span class="hook-tag ${s.enabled ? 'status-running' : 'status-stopped'}">${s.enabled ? '启用' : '禁用'}</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('Failed to load skills:', e);
            }
        }

        // 加载流程可视化数据
        async function loadFlowData() {
            try {
                const flowContainer = document.getElementById('flowTimeline');
                const resultsContainer = document.getElementById('taskResults');
                
                // 获取最近会话
                const sessionsRes = await fetch(`${API_BASE}/sessions`);
                const sessions = await sessionsRes.json();
                
                if (sessions.length === 0) {
                    flowContainer.innerHTML = '<div class="empty-flow">暂无会话数据</div>';
                    return;
                }
                
                const latestSession = sessions[0];
                
                // 获取任务结果
                const resultsRes = await fetch(`${API_BASE}/debug/results/${latestSession.session_id}`);
                const resultsData = await resultsRes.json();
                
                // 渲染任务结果
                if (resultsData.results && resultsData.results.length > 0) {
                    resultsContainer.innerHTML = resultsData.results.map(r => `
                        <div class="task-result">
                            <div class="task-result-header">
                                <span class="task-agent">🤖 ${r.agent_id}</span>
                                <span class="task-status ${r.status}">${r.status === 'success' ? '成功' : '失败'}</span>
                            </div>
                            <div class="task-result-content">
                                ${truncateContent(r.result)}
                            </div>
                            <div style="font-size: 10px; color: var(--text-secondary); margin-top: 4px;">
                                ${formatTime(r.created_at)}
                            </div>
                        </div>
                    `).join('');
                } else {
                    resultsContainer.innerHTML = '<div style="padding:10px;color:var(--text-secondary);font-size:11px;">暂无任务结果</div>';
                }
                
                // 尝试获取消息总线历史
                // 由于没有直接的trace_id，我们显示会话信息
                flowContainer.innerHTML = `
                    <div class="flow-item">
                        <div class="flow-content">
                            <div class="flow-agent">📋 会话信息</div>
                            <div style="font-size:11px;color:var(--text-secondary);">
                                <p>会话ID: ${latestSession.session_id.substring(0, 8)}...</p>
                                <p>标题: ${latestSession.title}</p>
                                <p>状态: ${latestSession.status}</p>
                                <p>创建时间: ${formatTime(latestSession.created_at)}</p>
                            </div>
                        </div>
                    </div>
                    <div class="flow-item" style="border-left-color: var(--success);">
                        <div class="flow-content">
                            <div class="flow-agent">💬 对话消息</div>
                            <div style="font-size:11px;color:var(--text-secondary);">
                                <p>点击会话可查看历史消息</p>
                            </div>
                        </div>
                    </div>
                `;
                
                // 加载历史消息
                try {
                    const historyRes = await fetch(`${API_BASE}/chat/history/${latestSession.session_id}`);
                    const history = await historyRes.json();
                    
                    if (history.messages && history.messages.length > 0) {
                        const historyHtml = history.messages.map(m => `
                            <div class="flow-item ${m.role === 'user' ? 'sender' : 'receiver'}">
                                <div class="flow-time">${formatTime(m.created_at)}</div>
                                <div class="flow-content">
                                    <div class="flow-agent">${m.role === 'user' ? '👤 用户' : '🤖 助手'}</div>
                                    <div class="flow-payload">${truncateContent(m.content)}</div>
                                </div>
                            </div>
                        `).join('');
                        
                        flowContainer.innerHTML += `
                            <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);">
                                <div class="panel-header" style="margin-bottom: 10px;">💬 消息历史</div>
                                ${historyHtml}
                            </div>
                        `;
                    }
                } catch (e) {
                    console.error('Failed to load history:', e);
                }
                
            } catch (e) {
                console.error('Failed to load flow data:', e);
                document.getElementById('flowTimeline').innerHTML = '<div class="empty-flow">加载失败: ' + e.message + '</div>';
            }
        }

        function truncateContent(content, maxLen = 200) {
            if (!content) return '';
            try {
                const parsed = JSON.parse(content);
                return JSON.stringify(parsed, null, 2).substring(0, maxLen);
            } catch {
                return content.substring(0, maxLen);
            }
        }

        // 加载 Provider 列表
        async function loadProviders() {
            try {
                const res = await fetch(`${API_BASE}/providers`);
                providers = await res.json();
                renderProviders();
            } catch (e) {
                console.error('Failed to load providers:', e);
            }
        }

        function renderProviders() {
            const list = document.getElementById('providersList');
            list.innerHTML = providers.map(p => `
                <div class="provider-item ${p.id === currentProvider ? 'active' : ''}" 
                     onclick="selectProvider('${p.id}')">
                    <div>
                        <h3>${p.name}</h3>
                        <p>${p.model}</p>
                    </div>
                    <div style="display:flex;align-items:center;gap:8px;">
                        <span class="provider-check">${p.id === currentProvider ? '✓' : ''}</span>
                        <button onclick="event.stopPropagation();deleteProvider('${p.id}')" 
                                style="background:transparent;border:none;color:var(--error);cursor:pointer;font-size:16px;">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        // 选择 Provider
        async function selectProvider(providerId) {
            try {
                await fetch(`${API_BASE}/providers/${providerId}/use`, { method: 'POST' });
                currentProvider = providerId;
                const p = providers.find(x => x.id === providerId);
                document.getElementById('currentModel').textContent = p.model;
                closeModelSelector();
                renderProviders();
            } catch (e) {
                console.error('Failed to select provider:', e);
            }
        }

        // 添加自定义 Provider
        function showAddProviderModal() {
            document.getElementById('addProviderModal').classList.add('active');
        }

        function closeAddProviderModal() {
            document.getElementById('addProviderModal').classList.remove('active');
        }

        async function addProvider() {
            const id = document.getElementById('providerId').value.trim();
            const name = document.getElementById('providerName').value.trim();
            const type = document.getElementById('providerType').value;
            const model = document.getElementById('providerModel').value.trim();
            const base_url = document.getElementById('providerBaseUrl').value.trim();
            const api_key = document.getElementById('providerApiKey').value.trim();

            if (!id || !name || !model || !api_key) {
                alert('请填写必要字段');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/providers`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id, name, type, model, 
                        base_url: base_url || 'https://api.openai.com/v1',
                        api_key
                    })
                });
                const data = await res.json();
                console.log('添加模型响应:', data);
                if (data.success) {
                    // 清空表单
                    document.getElementById('providerId').value = '';
                    document.getElementById('providerName').value = '';
                    document.getElementById('providerModel').value = '';
                    document.getElementById('providerBaseUrl').value = '';
                    document.getElementById('providerApiKey').value = '';
                    
                    closeAddProviderModal();
                    await loadProviders();
                    
                    // 显示成功消息
                    showToast(`✅ 模型 "${data.name}" 添加成功！模型: ${data.model}`, 'success');
                } else {
                    showToast('添加失败: ' + (data.detail || '未知错误'), 'error');
                }
            } catch (e) {
                showToast('添加失败: ' + e, 'error');
            }
        }

        // Toast 通知
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                bottom: 80px;
                left: 50%;
                transform: translateX(-50%);
                padding: 12px 24px;
                background: ${type === 'success' ? 'var(--success)' : type === 'error' ? 'var(--error)' : 'var(--accent)'};
                color: var(--bg-primary);
                border-radius: 8px;
                font-size: 13px;
                z-index: 10000;
                animation: fadeIn 0.3s;
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // 删除 Provider
        async function deleteProvider(providerId) {
            if (!confirm('确定要删除这个模型吗？')) return;
            try {
                const res = await fetch(`${API_BASE}/providers/${providerId}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    await loadProviders();
                    showToast('✅ 模型已删除', 'success');
                } else {
                    showToast('删除失败: ' + (data.detail || '未知错误'), 'error');
                }
            } catch (e) {
                showToast('删除失败: ' + e, 'error');
            }
        }

        // 创建新会话
        async function createNewSession() {
            try {
                const res = await fetch(`${API_BASE}/sessions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: '新会话' })
                });
                const data = await res.json();
                currentSessionId = data.session_id;
                await loadSessions();
                clearChat();
            } catch (e) {
                console.error('Failed to create session:', e);
            }
        }

        // 选择会话
        async function selectSession(sessionId) {
            currentSessionId = sessionId;
            await loadSessions();
            await loadChatHistory(sessionId);
        }

        // 加载聊天历史
        async function loadChatHistory(sessionId) {
            try {
                const res = await fetch(`${API_BASE}/chat/history/${sessionId}`);
                const history = await res.json();
                renderMessages(history.messages || []);
            } catch (e) {
                console.error('Failed to load chat history:', e);
            }
        }

        // 发送消息 - 使用 SSE 流式接收
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message || isLoading) return;

            input.value = '';
            input.style.height = 'auto';

            // 清空之前的流式消息和打字指示器
            hideTyping();
            eventStep = 0;
            const container = document.getElementById('chatContainer');
            container.querySelectorAll('.message.streaming, .collab-card').forEach(el => el.remove());

            appendMessage('user', message);
            showTyping();
            isLoading = true;
            document.getElementById('sendBtn').disabled = true;

            // 清空之前的事件显示
            updateEventTimeline([]);

            try {
                const res = await fetch(`${API_BASE}/chat/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, session_id: currentSessionId })
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let events = [];
                let currentEvent = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const raw = line.slice(6).trim();
                                let rawData;
                                try {
                                    rawData = JSON.parse(raw);
                                } catch {
                                    rawData = { data: raw };
                                }
                                const eventType = rawData.type || rawData.event || currentEvent;
                                let eventData = rawData.data;
                                // Only parse if data is a JSON string (starts with { or [)
                                if (typeof eventData === 'string' && eventData.trim().startsWith('{')) {
                                    try {
                                        eventData = JSON.parse(eventData);
                                    } catch {
                                        // keep as string if parse fails
                                    }
                                }
                                
                                // 收集事件
                                events.push({
                                    type: eventType,
                                    data: eventData,
                                    timestamp: new Date().toLocaleTimeString()
                                });

                                // 实时更新事件流显示
                                updateEventTimeline(events);

                                // 处理不同事件类型 - 显示多智能体协作流程
                                if (eventType === 'agent_start') {
                                    const agentId = eventData.agent || 'unknown';
                                    const instruction = eventData.data?.instruction || eventData.instruction || '';
                                    showAgentEvent(agentId, '📋 接收任务: ' + instruction.slice(0, 50) + (instruction.length > 50 ? '...' : ''), 'start');
                                } else if (eventType === 'agent_thinking') {
                                    const agentId = eventData.agent || 'unknown';
                                    showAgentEvent(agentId, '🤔 正在分析...', 'thinking');
                                } else if (eventType === 'agent_tool_call') {
                                    const agentId = eventData.agent || 'unknown';
                                    const toolName = eventData.data?.skill_id || eventData.skill_id || 'unknown';
                                    showAgentEvent(agentId, `🔧 执行任务: ${toolName}`, 'tool');
                                } else if (eventType === 'agent_output') {
                                    const agentId = eventData.agent || 'unknown';
                                    showAgentEvent(agentId, '📝 整理结果', 'output');
                                } else if (eventType === 'agent_done') {
                                    const agentId = eventData.agent || 'unknown';
                                    const result = eventData.data?.result || eventData.result || '';
                                    showAgentEvent(agentId, '✅ 任务完成', 'done');
                                } else if (eventType === 'final_response') {
                                    hideTyping();
                                    const reply = eventData.response || (eventData.data && eventData.data.response) || '';
                                    if (reply) {
                                        // 清空协作过程中的事件
                                        const container = document.getElementById('chatContainer');
                                        container.querySelectorAll('.message.agent-event').forEach(el => el.remove());
                                        // 显示最终回复
                                        const msgEl = appendStreamingMessage('assistant', reply);
                                        currentSessionId = eventData.session_id || currentSessionId;
                                        await loadSessions();
                                    }
                                } else if (eventType === 'done') {
                                    // 最终响应已处理
                                }
                            } catch (e) {
                                console.log('Parse event error:', e);
                            }
                        } else if (line.startsWith('event: ')) {
                            currentEvent = line.slice(7).trim();
                        }
                    }
                }

            } catch (e) {
                console.error('Chat error:', e);
                hideTyping();
                appendMessage('assistant', '抱歉发生了错误，请稍后重试。');
            }

            isLoading = false;
            document.getElementById('sendBtn').disabled = false;
        }

        // 实时显示 Agent 事件 - 多智能体协作流程
        let eventStep = 0;
        function showAgentEvent(agentId, message, type) {
            const container = document.getElementById('chatContainer');
            const empty = document.getElementById('emptyState');
            if (empty) empty.remove();

            const agentNames = {
                'research_agent': '🔍 研究员',
                'writer_agent': '✍️ 写作员',
                'executor_agent': '⚡ 执行者',
                'orchestrator': '🎯 调度器'
            };

            const agentColors = {
                'research_agent': '#58a6ff',
                'writer_agent': '#a371f7',
                'executor_agent': '#3fb950',
                'orchestrator': '#f0883e'
            };

            const icons = {
                'start': '📥',
                'thinking': '🤔',
                'tool': '⚙️',
                'output': '📝',
                'done': '✅',
                'error': '❌'
            };

            const displayName = agentNames[agentId] || agentId || '未知Agent';
            const agentColor = agentColors[agentId] || '#888';
            const icon = icons[type] || '📋';
            eventStep++;

            // 创建协作流程卡片
            const card = document.createElement('div');
            card.className = `collab-card ${type}`;
            card.innerHTML = `
                <div class="collab-step">第${eventStep}步</div>
                <div class="collab-content">
                    <div class="collab-agent" style="background:${agentColor}">${displayName}</div>
                    <div class="collab-arrow">→</div>
                    <div class="collab-message">${message}</div>
                </div>
                <div class="collab-icon">${icon}</div>
            `;
            container.appendChild(card);
            container.scrollTop = container.scrollHeight;
        }

        // 更新事件时间线
        function updateEventTimeline(events) {
            const container = document.getElementById('flowTimeline');
            if (!container) return;

            container.innerHTML = events.slice(-10).map(e => `
                <div class="flow-item ${e.type === 'final_response' ? 'receiver' : 'sender'}">
                    <div class="flow-time">${e.timestamp}</div>
                    <div class="flow-content">
                        <div class="flow-agent">${getEventIcon(e.type)} ${getEventLabel(e.type)}</div>
                        <div class="flow-payload">${truncateContent(JSON.stringify(e.data), 150)}</div>
                    </div>
                </div>
            `).join('');

            // 同时更新实时事件面板
            const liveContainer = document.getElementById('liveEvents');
            if (liveContainer && events.length > 0) {
                const latestEvent = events[events.length - 1];
                liveContainer.innerHTML = events.slice(-15).reverse().map(e => `
                    <div class="agent-event agent-event-${e.type.split('_').pop()}">
                        <span class="event-time">${e.timestamp}</span>
                        <span class="event-agent">${e.data?.agent || 'system'}</span>
                        <span class="event-message">${getEventLabel(e.type)}</span>
                    </div>
                `).join('');
            }
        }

        function getEventIcon(type) {
            const icons = {
                'agent_start': '🚀',
                'agent_thinking': '💭',
                'agent_tool_call': '🔧',
                'agent_output': '📤',
                'agent_done': '✅',
                'final_response': '🎯',
                'error': '❌'
            };
            return icons[type] || '📋';
        }

        function getEventLabel(type) {
            const labels = {
                'agent_start': '开始',
                'agent_thinking': '思考',
                'agent_tool_call': '工具调用',
                'agent_output': '输出',
                'agent_done': '完成',
                'final_response': '最终响应',
                'error': '错误'
            };
            return labels[type] || type;
        }

        // 添加消息
        function appendMessage(role, content) {
            const container = document.getElementById('chatContainer');
            const empty = document.getElementById('emptyState');
            if (empty) empty.remove();

            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            msg.innerHTML = `
                <div class="message-header">
                    <div class="message-avatar">${role === 'user' ? '👤' : '🤖'}</div>
                    <span class="message-role">${role === 'user' ? '用户' : '助手'}</span>
                    <span class="message-time">${formatTime(new Date().toISOString())}</span>
                </div>
                <div class="message-content">${formatContent(content)}</div>
            `;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }

        // 渲染消息历史
        function renderMessages(messages) {
            const container = document.getElementById('chatContainer');
            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" id="emptyState">
                        <div class="icon">💬</div>
                        <h2>会话历史</h2>
                        <p>发送消息开始新对话</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = messages.map(m => `
                <div class="message ${m.role}">
                    <div class="message-header">
                        <div class="message-avatar">${m.role === 'user' ? '👤' : '🤖'}</div>
                        <span class="message-role">${m.role === 'user' ? '用户' : '助手'}</span>
                        <span class="message-time">${formatTime(m.created_at || new Date().toISOString())}</span>
                    </div>
                    <div class="message-content">${formatContent(m.content)}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        function clearChat() {
            document.getElementById('chatContainer').innerHTML = `
                <div class="empty-state" id="emptyState">
                    <div class="icon">🤖</div>
                    <h2>Multi-Agent 智能协作系统</h2>
                    <p>开始对话，探索 AI 的无限可能</p>
                </div>
            `;
        }

        // 格式化内容
        function formatContent(content) {
            if (!content) return '';
            content = content.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code class="language-$1">$2</code></pre>');
            content = content.replace(/`([^`]+)`/g, '<code>$1</code>');
            content = content.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            content = content.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            content = content.replace(/^# (.+)$/gm, '<h1>$1</h1>');
            content = content.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            content = content.replace(/\*(.+?)\*/g, '<em>$1</em>');
            content = content.replace(/^- (.+)$/gm, '<li>$1</li>');
            content = content.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
            content = content.replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');
            content = content.replace(/\n\n/g, '</p><p>');
            content = content.replace(/\n/g, '<br>');
            content = `<p>${content}</p>`;
            content = content.replace(/<p><\/p>/g, '');
            content = content.replace(/<p>(<h[123]>)/g, '$1');
            content = content.replace(/(<\/h[123]>)<\/p>/g, '$1');
            content = content.replace(/<p>(<ul>)/g, '$1');
            content = content.replace(/(<\/ul>)<\/p>/g, '$1');
            content = content.replace(/<p>(<pre>)/g, '$1');
            content = content.replace(/(<\/pre>)<\/p>/g, '$1');
            return content;
        }

        // 流式追加消息内容（打字机效果）
        // 用于取消旧的流式输出
        let currentStreamId = 0;

        function appendStreamingMessage(role, content) {
            const container = document.getElementById('chatContainer');
            const empty = document.getElementById('emptyState');
            if (empty) empty.remove();

            // 取消之前的流式输出
            currentStreamId++;

            const msg = document.createElement('div');
            msg.className = `message ${role} streaming`;
            msg.dataset.streamId = currentStreamId;
            msg.innerHTML = `
                <div class="message-header">
                    <div class="message-avatar">${role === 'user' ? '👤' : '🤖'}</div>
                    <span class="message-role">${role === 'user' ? '用户' : '助手'}</span>
                    <span class="message-time">${formatTime(new Date().toISOString())}</span>
                </div>
                <div class="message-content typing-content"></div>
            `;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;

            // 异步流式显示内容（带取消标记）
            setTimeout(() => streamTextToElement(msg, content, currentStreamId), 0);

            return msg;
        }

        // 打字机效果流式显示文本
        async function streamTextToElement(msgEl, fullContent, streamId) {
            // 如果 streamId 不是当前的，说明已被取消
            if (msgEl.dataset.streamId != currentStreamId) return;

            const contentEl = msgEl.querySelector('.message-content');
            if (!contentEl) return;

            const rendered = formatContent(fullContent);
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = rendered;
            const text = tempDiv.textContent || tempDiv.innerText;

            const chunkSize = Math.max(2, Math.floor(text.length / 150));
            const delay = Math.max(5, Math.floor(2000 / (text.length / chunkSize)));

            for (let i = chunkSize; i <= text.length; i += chunkSize) {
                // 每次循环都检查是否已被取消
                if (msgEl.dataset.streamId != currentStreamId) return;

                const partialText = text.slice(0, i);
                contentEl.innerHTML = formatContent(partialText);
                contentEl.classList.add('typing-content');
                const chatContainer = document.getElementById('chatContainer');
                chatContainer.scrollTop = chatContainer.scrollHeight;
                await new Promise(r => setTimeout(r, delay));
            }

            // 流式完成，检查是否被取消
            if (msgEl.dataset.streamId != currentStreamId) return;
            contentEl.innerHTML = rendered;
            contentEl.classList.remove('typing-content');
            msgEl.classList.remove('streaming');
        }

        // 直接更新消息内容（不流式，用于 agent 事件）
        function updateMessageContent(msgEl, content) {
            const contentEl = msgEl.querySelector('.message-content');
            contentEl.innerHTML = formatContent(content);
        }

        function formatTime(isoString) {
            if (!isoString) return '';
            const d = new Date(isoString);
            return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        function showTyping() {
            const container = document.getElementById('chatContainer');
            const typing = document.createElement('div');
            typing.className = 'message assistant';
            typing.id = 'typingIndicator';
            typing.innerHTML = `
                <div class="message-header">
                    <div class="message-avatar">🤖</div>
                </div>
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            container.appendChild(typing);
            container.scrollTop = container.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // 弹窗
        function showModelSelector() {
            document.getElementById('modelSelectorModal').classList.add('active');
        }

        function closeModelSelector() {
            document.getElementById('modelSelectorModal').classList.remove('active');
        }

        async function showDebug() {
            try {
                const res = await fetch(`${API_BASE}/debug/status`);
                const data = await res.json();
                const content = document.getElementById('debugContent');
                content.innerHTML = `
                    <div style="margin-bottom:15px;">
                        <h3 style="margin-bottom:10px;">系统状态</h3>
                        <div class="panel-item">
                            <div class="panel-item-header">
                                <span>初始化状态</span>
                                <span class="${data.initialized ? 'status-running' : 'status-warning'}">${data.initialized ? '已完成' : '未完成'}</span>
                            </div>
                        </div>
                    </div>
                    <div style="margin-bottom:15px;">
                        <h3 style="margin-bottom:10px;">注册的 Agent (${data.agents ? data.agents.length : 0})</h3>
                        ${(data.agents || []).map(a => `
                            <div class="panel-item">
                                <div class="panel-item-header">
                                    <span class="panel-item-name">${a.id}</span>
                                    <span class="${a.running ? 'status-running' : 'status-stopped'}">${a.running ? '运行中' : '已停止'}</span>
                                </div>
                            </div>
                        `).join('') || '<div style="color:var(--error)">⚠️ 没有注册的 Agent</div>'}
                    </div>
                    <div style="margin-bottom:15px;">
                        <h3 style="margin-bottom:10px;">MessageBus 注册的 Agent</h3>
                        <div class="panel-item">
                            ${(data.bus_agents || []).join(', ') || '无'}
                        </div>
                    </div>
                `;
                document.getElementById('debugModal').classList.add('active');
            } catch (e) {
                alert('获取调试信息失败: ' + e);
            }
        }

        function closeDebug() {
            document.getElementById('debugModal').classList.remove('active');
        }

        async function reloadSystem() {
            if (!confirm('确定要重新加载系统吗？')) return;
            try {
                await fetch(`${API_BASE}/debug/reload`, { method: 'POST' });
                await init();
                alert('系统已重新加载');
            } catch (e) {
                alert('重新加载失败: ' + e);
            }
        }

        // 启动
        init();
    </script>
</body>
</html>
