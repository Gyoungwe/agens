<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Management - Agens</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        body { background: var(--bg-secondary); }
        .agent-list { display: flex; flex-direction: column; gap: 8px; }
        .agent-card {
            padding: 12px 16px;
            border: 1px solid var(--border-light);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .agent-card:hover { background: var(--bg-hover); }
        .agent-card.active {
            border-color: var(--accent);
            background: rgba(0, 113, 227, 0.03);
        }
        .agent-card-title { font-weight: 600; }
        .agent-card-meta { font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px; }
        .skill-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-light);
        }
        .skill-item:last-child { border-bottom: none; }
        .skill-item-info { flex: 1; }
        .skill-item-name { font-weight: 500; }
        .skill-item-desc { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }
        .backup-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-light);
        }
        .backup-item:last-child { border-bottom: none; }
        .backup-info { font-size: 0.875rem; }
        .backup-time { font-size: 0.75rem; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="page-container">
        <header class="header">
            <div>
                <h1>🤖 Agent Management</h1>
                <p class="text-secondary text-sm mt-2">Configure agents, manage skills and soul documents</p>
            </div>
            <div class="header-actions">
                <a href="/" class="btn btn-secondary">← Back</a>
            </div>
        </header>

        <div style="display: grid; grid-template-columns: 280px 1fr; gap: 24px;">
            <!-- Agent List -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">Agents</span>
                </div>
                <div id="loadingAgents" class="loading">
                    <div class="loading-spinner"></div>
                </div>
                <div id="agentList" class="agent-list"></div>
                <div id="noAgents" class="empty-state hidden">
                    <div class="empty-state-icon">🤖</div>
                    <div class="empty-state-title">No agents</div>
                </div>
            </div>

            <!-- Agent Details -->
            <div id="agentDetails">
                <div class="empty-state" style="padding: 100px 20px;">
                    <div class="empty-state-icon">👈</div>
                    <div class="empty-state-title">Select an agent</div>
                    <div class="empty-state-desc">Choose an agent from the list to view and edit its configuration</div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let agents = [];
        let currentAgent = null;
        let allSkills = [];

        async function init() {
            console.log('[Agent] Initializing...');
            await loadAgents();
            await loadAllSkills();
        }

        async function loadAgents() {
            try {
                const res = await fetch(`${API_BASE}/agents/`);
                const data = await res.json();
                agents = data.agents || [];
                renderAgentList();
            } catch (e) {
                showToast('Failed to load agents', 'error');
            }
        }

        async function loadAllSkills() {
            try {
                const res = await fetch(`${API_BASE}/skills/`);
                const data = await res.json();
                allSkills = data.skills || [];
            } catch (e) {
                console.error('[Agent] Failed to load skills:', e);
            }
        }

        function renderAgentList() {
            document.getElementById('loadingAgents').classList.add('hidden');
            
            if (agents.length === 0) {
                document.getElementById('noAgents').classList.remove('hidden');
                return;
            }

            document.getElementById('noAgents').classList.add('hidden');
            const list = document.getElementById('agentList');
            list.innerHTML = agents.map(a => `
                <div class="agent-card ${currentAgent?.agent_id === a.agent_id ? 'active' : ''}" 
                     onclick="selectAgent('${a.agent_id}')">
                    <div class="agent-card-title">${a.agent_id}</div>
                    <div class="agent-card-meta">${a.skill_count || 0} skills</div>
                </div>
            `).join('');
        }

        async function selectAgent(agentId) {
            try {
                const res = await fetch(`${API_BASE}/agents/${agentId}`);
                const data = await res.json();

                if (!data.success) {
                    showToast('Failed to load agent', 'error');
                    return;
                }

                currentAgent = data.agent;
                renderAgentList();
                renderAgentDetails();
            } catch (e) {
                showToast('Failed to load agent: ' + e.message, 'error');
            }
        }

        function renderAgentDetails() {
            if (!currentAgent) return;
            
            const agent = currentAgent;
            const details = document.getElementById('agentDetails');
            
            details.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">${agent.agent_id}</span>
                        <button class="btn btn-sm btn-secondary" onclick="reloadAgent()">↻ Reload</button>
                    </div>

                    <!-- Tabs -->
                    <div class="tabs">
                        <button class="tab-btn active" onclick="switchTab('profile', this)">Profile</button>
                        <button class="tab-btn" onclick="switchTab('skills', this)">Skills (${(agent.skills || []).length})</button>
                        <button class="tab-btn" onclick="switchTab('backups', this)">Backups</button>
                    </div>

                    <!-- Profile Tab -->
                    <div id="tab-profile">
                        <div class="grid-2 mb-4">
                            <div class="form-group">
                                <label class="form-label">Name</label>
                                <input type="text" id="input-name" class="input" value="${escapeHtml(agent.meta?.name || '')}">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Role</label>
                                <input type="text" id="input-role" class="input" value="${escapeHtml(agent.meta?.role || '')}">
                            </div>
                        </div>
                        <div class="grid-2 mb-4">
                            <div class="form-group">
                                <label class="form-label">Priority</label>
                                <select id="input-priority" class="input">
                                    <option value="low" ${agent.meta?.priority === 'low' ? 'selected' : ''}>Low</option>
                                    <option value="normal" ${agent.meta?.priority === 'normal' ? 'selected' : ''}>Normal</option>
                                    <option value="high" ${agent.meta?.priority === 'high' ? 'selected' : ''}>High</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Model</label>
                                <input type="text" id="input-model" class="input" value="${escapeHtml(agent.meta?.model || '')}">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">System Prompt</label>
                            <textarea id="input-system_prompt" class="input" rows="3">${escapeHtml(agent.meta?.system_prompt || '')}</textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Soul Document (Markdown)</label>
                            <textarea id="soulBody" class="input font-mono" rows="8">${escapeHtml(agent.body || '')}</textarea>
                        </div>
                        <div style="display: flex; gap: 12px; justify-content: flex-end;">
                            <button class="btn btn-secondary" onclick="selectAgent('${agent.agent_id}')">Reset</button>
                            <button class="btn btn-primary" onclick="saveSoul()">Save Changes</button>
                        </div>
                    </div>

                    <!-- Skills Tab -->
                    <div id="tab-skills" class="hidden">
                        <div class="flex justify-between items-center mb-4">
                            <p class="text-secondary text-sm">Manage skills assigned to this agent</p>
                            <button class="btn btn-primary btn-sm" onclick="showAddSkillModal()">+ Add Skill</button>
                        </div>
                        <div id="agentSkillsList">
                            ${renderSkillsList(agent.skills || [])}
                        </div>
                    </div>

                    <!-- Backups Tab -->
                    <div id="tab-backups" class="hidden">
                        <div class="flex justify-between items-center mb-4">
                            <p class="text-secondary text-sm">Soul document backup history</p>
                            <button class="btn btn-secondary btn-sm" onclick="createBackup()">+ Create Backup</button>
                        </div>
                        <div id="backupList"></div>
                        <div id="noBackups" class="empty-state hidden">
                            <div class="empty-state-icon">💾</div>
                            <div class="empty-state-title">No backups</div>
                        </div>
                    </div>
                </div>
            `;

            loadBackups();
        }

        function renderSkillsList(skills) {
            if (!skills || skills.length === 0) {
                return `<div class="empty-state"><div class="empty-state-title">No skills assigned</div></div>`;
            }
            
            return skills.map(s => `
                <div class="skill-item">
                    <div class="skill-item-info">
                        <div class="skill-item-name">${escapeHtml(s.name || s.skill_id)}</div>
                        <div class="skill-item-desc">${escapeHtml(s.description || 'No description')}</div>
                    </div>
                    <button class="btn btn-sm btn-danger" onclick="removeSkill('${s.skill_id}')">Remove</button>
                </div>
            `).join('');
        }

        function switchTab(tab, btnElement) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('[id^="tab-"]').forEach(div => div.classList.add('hidden'));
            
            if (btnElement) btnElement.classList.add('active');
            document.getElementById(`tab-${tab}`).classList.remove('hidden');

            if (tab === 'backups') loadBackups();
        }

        async function loadBackups() {
            if (!currentAgent) return;
            
            try {
                const res = await fetch(`${API_BASE}/agents/${currentAgent.agent_id}/backups`);
                const data = await res.json();
                const backups = data.backups || [];
                
                const list = document.getElementById('backupList');
                const noBackups = document.getElementById('noBackups');
                
                if (backups.length === 0) {
                    list.innerHTML = '';
                    noBackups.classList.remove('hidden');
                    return;
                }

                noBackups.classList.add('hidden');
                list.innerHTML = backups.map(b => `
                    <div class="backup-item">
                        <div>
                            <div class="backup-info">${escapeHtml(b.name)}</div>
                            <div class="backup-time">${b.created_at}</div>
                        </div>
                        <div style="display: flex; gap: 8px;">
                            <button class="btn btn-sm btn-secondary" onclick="restoreBackup('${b.name}')">Restore</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteBackup('${b.name}')">Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('[Agent] Failed to load backups:', e);
            }
        }

        async function saveSoul() {
            if (!currentAgent) return;

            const meta = {
                name: document.getElementById('input-name').value,
                role: document.getElementById('input-role').value,
                priority: document.getElementById('input-priority').value,
                model: document.getElementById('input-model').value,
                system_prompt: document.getElementById('input-system_prompt').value,
                skills: currentAgent.meta?.skills || [],
                tools: currentAgent.meta?.tools || [],
            };
            const body = document.getElementById('soulBody').value;

            try {
                const res = await fetch(`${API_BASE}/agents/${currentAgent.agent_id}/soul`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ meta, body })
                });
                const data = await res.json();

                if (data.success) {
                    showToast('Saved successfully!' + (data.diff?.summary || ''), 'success');
                } else {
                    showToast('Save failed', 'error');
                }
            } catch (e) {
                showToast('Save failed: ' + e.message, 'error');
            }
        }

        function showAddSkillModal() {
            const availableSkills = allSkills.filter(s => 
                !(currentAgent.skills || []).some(as => as.skill_id === s.skill_id)
            );

            const content = availableSkills.length === 0 
                ? '<div class="empty-state"><div class="empty-state-title">All skills are assigned</div></div>'
                : availableSkills.map(s => `
                    <div class="skill-item" style="cursor: pointer;" onclick="addSkill('${s.skill_id}')">
                        <div class="skill-item-info">
                            <div class="skill-item-name">${escapeHtml(s.name || s.skill_id)}</div>
                            <div class="skill-item-desc">${escapeHtml(s.description || 'No description')}</div>
                        </div>
                        <span class="tag">+ Add</span>
                    </div>
                `).join('');

            const modal = document.createElement('div');
            modal.className = 'modal active';
            modal.id = 'addSkillModal';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="modal-title">Add Skill to ${currentAgent.agent_id}</h2>
                        <button class="modal-close" onclick="closeAddSkillModal()">×</button>
                    </div>
                    ${content}
                </div>
            `;
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeAddSkillModal();
            });
            document.body.appendChild(modal);
        }

        function closeAddSkillModal() {
            const modal = document.getElementById('addSkillModal');
            if (modal) modal.remove();
        }

        async function addSkill(skillId) {
            if (!currentAgent) return;
            
            const currentSkills = currentAgent.meta?.skills || [];
            if (!currentSkills.includes(skillId)) {
                currentAgent.meta.skills = [...currentSkills, skillId];
                await saveSoul();
            }
            closeAddSkillModal();
            renderAgentDetails();
            showToast(`Skill ${skillId} added`, 'success');
        }

        async function removeSkill(skillId) {
            if (!currentAgent) return;
            if (!confirm(`Remove ${skillId} from ${currentAgent.agent_id}?`)) return;

            const currentSkills = currentAgent.meta?.skills || [];
            currentAgent.meta.skills = currentSkills.filter(s => s !== skillId);
            
            try {
                const res = await fetch(`${API_BASE}/agents/${currentAgent.agent_id}/soul`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        meta: currentAgent.meta,
                        body: currentAgent.body 
                    })
                });
                const data = await res.json();

                if (data.success) {
                    showToast(`Skill ${skillId} removed`, 'success');
                    await selectAgent(currentAgent.agent_id);
                } else {
                    showToast('Failed to remove skill', 'error');
                }
            } catch (e) {
                showToast('Failed to remove skill', 'error');
            }
        }

        async function createBackup() {
            if (!currentAgent) return;
            
            try {
                const res = await fetch(`${API_BASE}/agents/${currentAgent.agent_id}/backup`, {
                    method: 'POST'
                });
                const data = await res.json();

                if (data.success) {
                    showToast('Backup created', 'success');
                    loadBackups();
                } else {
                    showToast('Failed to create backup', 'error');
                }
            } catch (e) {
                showToast('Failed to create backup', 'error');
            }
        }

        async function restoreBackup(backupName) {
            if (!currentAgent) return;
            if (!confirm(`Restore backup ${backupName}?`)) return;

            try {
                const res = await fetch(`${API_BASE}/agents/${currentAgent.agent_id}/backups/${backupName}/restore`, {
                    method: 'POST'
                });
                const data = await res.json();

                if (data.success) {
                    showToast('Backup restored', 'success');
                    await selectAgent(currentAgent.agent_id);
                } else {
                    showToast('Failed to restore', 'error');
                }
            } catch (e) {
                showToast('Failed to restore backup', 'error');
            }
        }

        async function deleteBackup(backupName) {
            if (!currentAgent) return;
            if (!confirm(`Delete backup ${backupName}?`)) return;

            try {
                const res = await fetch(`${API_BASE}/agents/${currentAgent.agent_id}/backups/${backupName}`, {
                    method: 'DELETE'
                });
                
                if (res.ok) {
                    showToast('Backup deleted', 'success');
                    loadBackups();
                } else {
                    showToast('Failed to delete', 'error');
                }
            } catch (e) {
                showToast('Failed to delete backup', 'error');
            }
        }

        async function reloadAgent() {
            if (!currentAgent) return;
            await selectAgent(currentAgent.agent_id);
            showToast('Agent reloaded', 'success');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        init();
    </script>
</body>
</html>
