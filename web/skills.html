<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills Management - Agens</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        body { background: var(--bg-secondary); }
        .skill-card {
            padding: 16px;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            transition: all 0.15s ease;
        }
        .skill-card:hover { border-color: var(--border); }
        .skill-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px; }
        .skill-name { font-weight: 600; font-size: 1rem; }
        .skill-id { font-size: 0.75rem; color: var(--text-secondary); font-family: monospace; }
        .skill-desc { font-size: 0.875rem; color: var(--text-secondary); margin: 8px 0; line-height: 1.5; }
        .skill-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
        .skill-actions { display: flex; gap: 8px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-light); }
        .import-tabs { display: flex; gap: 4px; margin-bottom: 16px; }
        .import-tab {
            padding: 8px 16px;
            font-size: 0.875rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-tertiary);
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .import-tab.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="page-container">
        <header class="header">
            <div>
                <h1>🛠️ Skills Management</h1>
                <p class="text-secondary text-sm mt-2">Manage and import agent skills</p>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="reloadAllSkills()">↻ Reload All</button>
                <button class="btn btn-primary" onclick="showImportModal()">+ Import Claude Skill</button>
            </div>
        </header>

        <!-- Stats -->
        <div class="stats-grid mb-4">
            <div class="stat-card">
                <div class="stat-value" id="totalSkills">0</div>
                <div class="stat-label">Total Skills</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="enabledSkills">0</div>
                <div class="stat-label">Enabled</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="claudeSkills">0</div>
                <div class="stat-label">Claude Import</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="localSkills">0</div>
                <div class="stat-label">Local</div>
            </div>
        </div>

        <!-- Skills Grid -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">Installed Skills</span>
            </div>
            <div id="skillsGrid" class="grid-3" style="gap: 16px;"></div>
            <div id="emptySkills" class="empty-state hidden">
                <div class="empty-state-icon">🛠️</div>
                <div class="empty-state-title">No skills installed</div>
                <div class="empty-state-desc">Import a Claude skill to get started</div>
            </div>
        </div>
    </div>

    <!-- Import Modal -->
    <div id="importModal" class="modal">
        <div class="modal-content" style="max-width: 640px;">
            <div class="modal-header">
                <h2 class="modal-title">📥 Import Claude Skill</h2>
                <button class="modal-close" onclick="hideImportModal()">×</button>
            </div>

            <div class="import-tabs">
                <button id="tab-paste" class="import-tab active" onclick="switchImportTab('paste')">📝 Paste JSON</button>
                <button id="tab-file" class="import-tab" onclick="switchImportTab('file')">📁 Upload File</button>
            </div>

            <!-- Paste Tab -->
            <div id="import-paste">
                <div class="form-group">
                    <label class="form-label">Claude Tool JSON Schema</label>
                    <textarea id="claudeSchema" class="input font-mono" rows="10" placeholder='{
  "name": "my_tool",
  "description": "Tool description",
  "input_schema": {
    "type": "object",
    "properties": {
      "param1": {
        "type": "string",
        "description": "Parameter description"
      }
    },
    "required": ["param1"]
  }
}'></textarea>
                </div>
            </div>

            <!-- File Tab -->
            <div id="import-file" class="hidden">
                <div class="form-group">
                    <label class="form-label">Select JSON File</label>
                    <input type="file" id="schemaFile" accept=".json" class="input" onchange="handleFileSelect(event)">
                </div>
                <div id="fileContentPreview" class="json-viewer hidden mb-4"></div>
            </div>

            <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px;">
                <button class="btn btn-secondary" onclick="hideImportModal()">Cancel</button>
                <button class="btn btn-primary" onclick="previewDraft()">🔍 Preview Draft</button>
            </div>

            <div id="previewSection" class="hidden" style="margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border-light);">
                <h3 style="margin-bottom: 16px;">📋 Draft Preview</h3>
                <div id="previewContent"></div>
                <div id="previewWarnings" class="mb-4"></div>
                <div style="display: flex; gap: 12px;">
                    <button class="btn btn-secondary" onclick="hidePreview()">Edit Again</button>
                    <button class="btn btn-success" onclick="installDraft()">✅ Install Skill</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let skills = [];
        let currentDraftId = null;

        async function init() {
            console.log('[Skills] Initializing...');
            await loadSkills();
        }

        async function loadSkills() {
            try {
                const res = await fetch(`${API_BASE}/skills/`);
                const data = await res.json();
                skills = data.skills || [];
                renderStats();
                renderSkills();
            } catch (e) {
                showToast('Failed to load skills', 'error');
            }
        }

        function renderStats() {
            document.getElementById('totalSkills').textContent = skills.length;
            document.getElementById('enabledSkills').textContent = skills.filter(s => s.enabled).length;
            document.getElementById('claudeSkills').textContent = skills.filter(s => s.source === 'claude_skill').length;
            document.getElementById('localSkills').textContent = skills.filter(s => s.source === 'local').length;
        }

        function renderSkills() {
            const grid = document.getElementById('skillsGrid');
            const empty = document.getElementById('emptySkills');

            if (skills.length === 0) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            grid.innerHTML = skills.map(s => {
                const tags = JSON.parse(s.tags || '[]');
                return `
                <div class="skill-card">
                    <div class="skill-header">
                        <div>
                            <div class="skill-name">${escapeHtml(s.name || s.skill_id)}</div>
                            <div class="skill-id">${s.skill_id}</div>
                        </div>
                        <div class="toggle ${s.enabled ? 'active' : ''}" onclick="toggleSkill('${s.skill_id}', ${!s.enabled})"></div>
                    </div>
                    <div class="skill-desc">${escapeHtml(s.description || 'No description')}</div>
                    <div class="skill-tags">
                        ${tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
                        <span class="tag ${s.enabled ? 'tag-success' : ''}">${s.enabled ? 'Enabled' : 'Disabled'}</span>
                    </div>
                    <div class="skill-actions">
                        <button class="btn btn-sm btn-secondary" onclick="reloadSkill('${s.skill_id}')">↻ Reload</button>
                        <button class="btn btn-sm btn-secondary" onclick="copySkillId('${s.skill_id}')">📋 Copy ID</button>
                        <button class="btn btn-sm btn-danger" onclick="uninstallSkill('${s.skill_id}')">🗑️ Uninstall</button>
                    </div>
                </div>
            `}).join('');
        }

        function switchImportTab(tab) {
            document.getElementById('tab-paste').classList.toggle('active', tab === 'paste');
            document.getElementById('tab-file').classList.toggle('active', tab === 'file');
            document.getElementById('import-paste').classList.toggle('hidden', tab !== 'paste');
            document.getElementById('import-file').classList.toggle('hidden', tab !== 'file');
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                try {
                    const parsed = JSON.parse(content);
                    document.getElementById('claudeSchema').value = JSON.stringify(parsed, null, 2);
                    document.getElementById('fileContentPreview').classList.remove('hidden');
                    document.getElementById('fileContentPreview').textContent = content.substring(0, 500) + (content.length > 500 ? '...' : '');
                    showToast('File loaded successfully', 'success');
                } catch (e) {
                    showToast('Invalid JSON file', 'error');
                }
            };
            reader.readAsText(file);
        }

        async function previewDraft() {
            const schemaText = document.getElementById('claudeSchema').value.trim();
            if (!schemaText) {
                showToast('Please enter JSON Schema', 'error');
                return;
            }

            let schema;
            try {
                schema = JSON.parse(schemaText);
            } catch (e) {
                showToast('Invalid JSON: ' + e.message, 'error');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/skills/import/claude`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: schemaText
                });
                const data = await res.json();

                if (data.success) {
                    currentDraftId = data.draft_id;
                    showDraftPreview(data.preview, data.warnings);
                } else {
                    showToast('Preview failed: ' + (data.detail || 'Unknown error'), 'error');
                }
            } catch (e) {
                showToast('Preview failed: ' + e.message, 'error');
            }
        }

        function showDraftPreview(preview, warnings) {
            const params = (preview.parameters || []).map(p => 
                `• ${p.name} (${p.type}) ${p.required ? '🔴 required' : '🟢 optional'} - ${p.description || 'No description'}`
            ).join('\n');

            document.getElementById('previewContent').innerHTML = `
                <div class="json-viewer">
                    <strong>Tool Name:</strong> ${escapeHtml(preview.tool_name)}
                    
                    <strong style="display: block; margin-top: 12px;">Description:</strong> ${escapeHtml(preview.description || 'None')}
                    
                    <strong style="display: block; margin-top: 12px;">Parameters:</strong>
                    ${params || 'No parameters'}
                </div>
            `;

            if (warnings && warnings.length > 0) {
                document.getElementById('previewWarnings').innerHTML = `
                    <div class="tag tag-warning" style="display: inline-flex; gap: 4px;">
                        ⚠️ ${warnings.join(', ')}
                    </div>
                `;
            } else {
                document.getElementById('previewWarnings').innerHTML = '';
            }

            document.getElementById('previewSection').classList.remove('hidden');
        }

        function hidePreview() {
            document.getElementById('previewSection').classList.add('hidden');
            currentDraftId = null;
        }

        async function installDraft() {
            if (!currentDraftId) {
                showToast('Please preview a draft first', 'error');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/skills/drafts/${currentDraftId}/install`, {
                    method: 'POST'
                });
                const data = await res.json();

                if (data.success) {
                    showToast(`Skill ${data.skill_id} installed!`, 'success');
                    hideImportModal();
                    await loadSkills();
                } else {
                    showToast('Install failed: ' + (data.error || 'Unknown'), 'error');
                }
            } catch (e) {
                showToast('Install failed: ' + e.message, 'error');
            }
        }

        function showImportModal() {
            document.getElementById('importModal').classList.add('active');
            document.getElementById('previewSection').classList.add('hidden');
            document.getElementById('claudeSchema').value = '';
            document.getElementById('schemaFile').value = '';
            document.getElementById('fileContentPreview').classList.add('hidden');
            switchImportTab('paste');
        }

        function hideImportModal() {
            document.getElementById('importModal').classList.remove('active');
        }

        async function toggleSkill(skillId, enable) {
            try {
                const endpoint = enable ? 'enable' : 'disable';
                await fetch(`${API_BASE}/skills/${endpoint}/${skillId}`, { method: 'POST' });
                showToast(`${enable ? 'Enabled' : 'Disabled'} ${skillId}`, 'success');
                await loadSkills();
            } catch (e) {
                showToast('Operation failed', 'error');
            }
        }

        async function reloadSkill(skillId) {
            try {
                await fetch(`${API_BASE}/skills/reload/${skillId}`, { method: 'POST' });
                showToast(`${skillId} reloaded`, 'success');
            } catch (e) {
                showToast('Reload failed', 'error');
            }
        }

        async function reloadAllSkills() {
            try {
                await fetch(`${API_BASE}/skills/reload-all`, { method: 'POST' });
                showToast('All skills reloaded', 'success');
                await loadSkills();
            } catch (e) {
                showToast('Reload all failed', 'error');
            }
        }

        async function uninstallSkill(skillId) {
            if (!confirm(`Uninstall ${skillId}?`)) return;

            try {
                await fetch(`${API_BASE}/skills/${skillId}`, { method: 'DELETE' });
                showToast(`${skillId} uninstalled`, 'success');
                await loadSkills();
            } catch (e) {
                showToast('Uninstall failed', 'error');
            }
        }

        function copySkillId(skillId) {
            navigator.clipboard.writeText(skillId).then(() => {
                showToast('Copied!', 'success');
            });
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Close modal on backdrop click
        document.getElementById('importModal')?.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal')) {
                hideImportModal();
            }
        });

        init();
    </script>
</body>
</html>
