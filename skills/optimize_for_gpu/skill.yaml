skill_id: optimize_for_gpu
name: optimize-for-gpu
description: GPU-accelerate Python code using CuPy, Numba CUDA, Warp, cuDF, cuML,
  cuGraph, KvikIO, cuCIM, cuxfilter, cuVS, cuSpatial, and RAFT. Use whenever the user
  mentions GPU/CUDA/NVIDIA acceleration, or wants to speed up NumPy, pandas, scikit-learn,
  scikit-image, NetworkX, GeoPandas, or Faiss workloads. Covers physics simulation,
  differentiable rendering, mesh ray casting, particle systems (DEM/SPH/fluids), vector/similarity
  search, GPUDirect Storage file IO, interactive dashboards, geospatial analysis,
  medical imaging, and sparse eigensolvers. Also use when you see CPU-bound Python
  code (loops, large arrays, ML pipelines, graph analytics, image processing) that
  would benefit from GPU acceleration, even if not explicitly requested.
