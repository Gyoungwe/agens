name: usfiscaldata
description: Query the U.S. Treasury Fiscal Data API for federal financial data including
  national debt, government spending, revenue, interest rates, exchange rates, and
  savings bonds. Access 54 datasets and 182 data tables with no API key required.
  Use when working with U.S. federal fiscal data, national debt tracking (Debt to
  the Penny), Daily Treasury Statements, Monthly Treasury Statements, Treasury securities
  auctions, interest rates on Treasury securities, foreign exchange rates, savings
  bonds, or any U.S. government financial statistics.
