skill_id: paper_lookup
name: paper-lookup
description: Search 10 academic paper databases via their REST APIs to find research
  papers, preprints, and scholarly articles. Covers biomedical literature (PubMed,
  PMC full text), preprint servers (bioRxiv, medRxiv, arXiv), multidisciplinary indexes
  (OpenAlex, Crossref, Semantic Scholar), open access aggregators (CORE, Unpaywall).
  Use this skill whenever the user wants to search for research papers, find citations,
  look up articles by DOI or PMID, retrieve abstracts or full text, check open access
  availability, find preprints, explore citation graphs, search by author or keyword,
  or access any scholarly literature database. Also trigger when the user mentions
  PubMed, PMC, bioRxiv, medRxiv, arXiv, OpenAlex, Crossref, Semantic Scholar, CORE,
  Unpaywall, or asks about paper metadata, citation counts, journal articles, manuscript
  lookups, literature reviews, or systematic searches. Even if the user just says
  "find papers on X" or "what's been published about Y" or "look up this DOI", this
  skill should activate.
