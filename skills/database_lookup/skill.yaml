skill_id: database_lookup
name: database-lookup
description: Search 78 public scientific, biomedical, materials science, and economic
  databases via their REST APIs and return structured JSON results. Covers physics/astronomy
  (NASA, NIST, SDSS, SIMBAD, Exoplanet Archive), earth/environment (USGS, NOAA, EPA,
  OpenWeatherMap), chemistry/drugs (PubChem, ChEMBL, DrugBank, FDA, KEGG, DailyMed,
  ZINC, BindingDB), materials science (Materials Project, COD), biology/genomics (Reactome,
  BRENDA, UniProt, STRING, Ensembl, NCBI Gene, GEO, GTEx, PDB, AlphaFold, InterPro,
  ChEBI, BioGRID, Gene Ontology, QuickGO, NCBI Protein/Taxonomy, dbSNP, SRA, ENA,
  gnomAD, UCSC Genome, ENCODE, JASPAR, MouseMine, PRIDE, LINCS L1000, Human Protein
  Atlas, Human Cell Atlas, RummaGEO, Metabolomics Workbench, EMDB, Addgene), disease/clinical
  (COSMIC, Open Targets, ClinPGx, ClinicalTrials.gov, OMIM, ClinVar, GDC/TCGA, cBioPortal,
  DisGeNET, GWAS Catalog, Monarch, HPO), regulatory (FDA, USPTO, SEC EDGAR), economics/finance
  (FRED, BEA, BLS, Federal Reserve, World Bank, ECB, US Treasury, Alpha Vantage, Data
  Commons), and demographics (US Census, Eurostat, WHO). Use this skill whenever the
  user wants to look up compounds, drugs, proteins, genes, pathways, enzymes, gene
  expression, variants, clinical trials, patents, SEC filings, economic indicators,
  crystal structures, astronomical objects, earthquakes, weather, or any data from
  a public database API. Also trigger when the user mentions any database by name
  or asks about molecular properties, drug-target interactions, binding affinities,
  protein interactions, pathway membership, pharmacogenomics, economic time series,
  materials properties, commercially available compounds, virtual screening, compound
  purchasability, chemical libraries, building blocks, cancer genomics, somatic mutations,
  tumor mutation profiles, nucleotide sequences, genome assemblies, sequencing reads,
  ENA accessions, INSDC data, or wants to cross-reference entities across sources.
