description: Guide for building Graph Neural Networks with PyTorch Geometric (PyG).
  Use this skill whenever the user asks about graph neural networks, GNNs, node classification,
  link prediction, graph classification, message passing networks, heterogeneous graphs,
  neighbor sampling, or any task involving torch_geometric / PyG. Also trigger when
